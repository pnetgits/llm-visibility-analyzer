<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Page Visibility Analyzer</title>
<meta name="description" content="See exactly what LLMs can extract from any web page — and what they miss.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0F13;
    --surface: #141A22;
    --surface2: #1A2130;
    --border: #252D3A;
    --border-light: #2E3A4A;
    --text: #D8DEE9;
    --muted: #7E8B9E;
    --dim: #4E5A6E;
    --accent: #4DA8DA;
    --accent-dim: rgba(77,168,218,0.09);
    --green: #4ADE80;
    --green-bg: rgba(74,222,128,0.07);
    --red: #F87171;
    --red-bg: rgba(248,113,113,0.08);
    --orange: #FBBF24;
    --orange-bg: rgba(251,191,36,0.07);
    --purple: #A78BFA;
    --purple-bg: rgba(167,139,250,0.07);
    --cyan: #22D3EE;
    --emerald: #34D399;
    --emerald-bg: rgba(52,211,153,0.07);
    --emerald-dim: rgba(52,211,153,0.09);
    --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .fade-in { animation: fadeIn 0.3s ease-out; }
  .slide-in { animation: slideIn 0.25s ease-out; }
  .pulsing { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

/* ═══════════════════════════════════════════════════════════════════
   UTILITY HELPERS
   ═══════════════════════════════════════════════════════════════════ */
function strip(s) { return (s || "").replace(/\s+/g, " ").trim(); }
function trunc(s, n = 100) { return !s ? "" : s.length > n ? s.slice(0, n) + "\u2026" : s; }

/* ═══════════════════════════════════════════════════════════════════
   PARSERS — extract structured data from a DOM document
   ═══════════════════════════════════════════════════════════════════ */
function parseDoc(html) {
  return new DOMParser().parseFromString(html || "<html><body></body></html>", "text/html");
}

function extractMeta(doc) {
  const items = [];
  const t = doc.querySelector("title");
  if (t) items.push({ name: "title", content: strip(t.textContent) });
  const c = doc.querySelector('link[rel="canonical"]');
  if (c) items.push({ name: "canonical", content: c.getAttribute("href") || "" });
  doc.querySelectorAll("meta").forEach((m) => {
    const name = m.getAttribute("name") || m.getAttribute("property") || m.getAttribute("http-equiv");
    const content = m.getAttribute("content");
    if (name && content) items.push({ name, content });
  });
  return items;
}

function extractSchema(doc) {
  const items = [];
  doc.querySelectorAll('script[type="application/ld+json"]').forEach((s) => {
    try { items.push({ parsed: JSON.parse(s.textContent), raw: s.textContent.trim(), error: false }); }
    catch { items.push({ parsed: null, raw: s.textContent.trim().slice(0, 300), error: true }); }
  });
  return items;
}

function extractHeadings(doc) {
  const items = [];
  doc.querySelectorAll("h1,h2,h3,h4,h5,h6").forEach((h) => {
    let text = "";
    h.childNodes.forEach((n) => {
      if (n.nodeType === Node.TEXT_NODE) text += n.textContent;
      else if (n.nodeType === Node.ELEMENT_NODE && !["style","script","link"].includes(n.tagName.toLowerCase())) {
        text += n.textContent;
      }
    });
    text = strip(text);
    if (text.length > 1 && text.length < 500 && !/\{[^}]*!important/.test(text) && !/border-radius|font-family|background-color/.test(text)) {
      items.push({ level: h.tagName, text });
    }
  });
  return items;
}

function extractLinks(doc) {
  const items = [], seen = new Set();
  doc.querySelectorAll("a[href]").forEach((a) => {
    const href = a.getAttribute("href") || "";
    const text = strip(a.textContent).slice(0, 150);
    if (!href || href.startsWith("javascript:") || href === "#") return;
    const key = href + "|" + text;
    if (seen.has(key)) return;
    seen.add(key);
    items.push({ href, text: text || "[no anchor text]" });
  });
  return items;
}

function extractImages(doc) {
  const items = [], seen = new Set();
  doc.querySelectorAll("img").forEach((img) => {
    const src = img.getAttribute("src") || img.getAttribute("data-src") || "";
    const alt = img.getAttribute("alt") || "";
    if (!src || seen.has(src)) return;
    seen.add(src);
    items.push({ src, alt, hasAlt: alt.length > 0 });
  });
  return items;
}

function extractText(doc) {
  const blocks = [], seen = new Set();
  if (!doc.body) return blocks;
  const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
    acceptNode: (node) => {
      const p = node.parentElement;
      if (!p) return NodeFilter.FILTER_REJECT;
      const tag = p.tagName?.toLowerCase();
      if (["script","style","noscript","template","svg"].includes(tag)) return NodeFilter.FILTER_REJECT;
      return node.textContent.trim().length < 5 ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
    },
  });
  while (walker.nextNode()) {
    const text = strip(walker.currentNode.textContent);
    if (text.length >= 12 && !seen.has(text)) {
      seen.add(text);
      blocks.push({ text, tag: walker.currentNode.parentElement?.tagName?.toLowerCase() || "?" });
    }
  }
  return blocks;
}

function extractDataAttrs(doc) {
  const items = [];
  if (!doc.body) return items;
  doc.body.querySelectorAll("*").forEach((el) => {
    Array.from(el.attributes).forEach((attr) => {
      if (!attr.name.startsWith("data-")) return;
      const val = attr.value.trim();
      if (!val.startsWith("{") && !val.startsWith("[")) return;
      try {
        items.push({ element: el.tagName.toLowerCase(), attr: attr.name, data: JSON.parse(val) });
      } catch {
        try {
          const decoded = val.replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
          items.push({ element: el.tagName.toLowerCase(), attr: attr.name, data: JSON.parse(decoded) });
        } catch { /* skip */ }
      }
    });
  });
  return items;
}

/* ═══════════════════════════════════════════════════════════════════
   LAYER 1 — SOURCE AUDIT (flag problems)
   ═══════════════════════════════════════════════════════════════════ */
function auditSource(doc, html) {
  const issues = [];

  doc.querySelectorAll("[onclick]").forEach((el) => {
    const h = el.getAttribute("onclick") || "";
    if (/navigate|router\.push|location\.href|window\.open|goTo|history\.push/i.test(h)) {
      issues.push({
        severity: "high", type: "fake-link",
        title: "JS onclick navigation \u2014 not a real link",
        detail: `<${el.tagName.toLowerCase()} onclick="${trunc(h,70)}"> "${trunc(strip(el.textContent),50)}"`,
        why: "LLMs can't execute JavaScript. This navigation only works in a browser \u2014 LLMs will never discover the destination URL.",
      });
    }
  });

  (html.match(/onClick\s*=\s*\{[^}]*(navigate|router\.push|history\.push)[^}]*\}/gi) || []).forEach((m) => {
    issues.push({
      severity: "high", type: "fake-link",
      title: "React onClick navigation pattern",
      detail: trunc(m, 120),
      why: "JS framework navigation handler. The URL is embedded in code, not in an <a href> \u2014 LLMs won't follow it.",
    });
  });

  doc.querySelectorAll("button[onclick]").forEach((btn) => {
    const h = btn.getAttribute("onclick") || "";
    if (/product|page|link|url|navigate|route/i.test(h)) {
      issues.push({
        severity: "high", type: "fake-link",
        title: "Button with JS navigation",
        detail: `<button onclick="${trunc(h,60)}">${trunc(strip(btn.textContent),40)}</button>`,
        why: "Buttons with onclick handlers look clickable to users but are invisible navigation paths for LLMs.",
      });
    }
  });

  doc.querySelectorAll("a[href]").forEach((a) => {
    const style = (a.getAttribute("style")||"") + " " + (a.parentElement?.getAttribute("style")||"");
    if (/display\s*:\s*none|visibility\s*:\s*hidden|opacity\s*:\s*0[^.]|height\s*:\s*0[^.]|font-size\s*:\s*0/i.test(style)) {
      issues.push({
        severity: "medium", type: "hidden-link",
        title: "Link hidden via inline CSS",
        detail: `<a href="${trunc(a.getAttribute("href"),60)}" style="${trunc(a.getAttribute("style"),60)}">${trunc(strip(a.textContent),40)}</a>`,
        why: "Links hidden with inline CSS may be ignored by search engines and LLMs that detect cloaking patterns.",
      });
    }
  });

  doc.querySelectorAll('a[href][aria-hidden="true"]').forEach((a) => {
    const href = a.getAttribute("href") || "";
    if (href && href !== "#") {
      issues.push({
        severity: "low", type: "hidden-link",
        title: 'Link with aria-hidden="true"',
        detail: `<a href="${trunc(href,60)}" aria-hidden="true">${trunc(strip(a.textContent),40)}</a>`,
        why: "aria-hidden tells assistive tech to ignore this element. Some LLMs may also skip it.",
      });
    }
  });

  doc.querySelectorAll("noscript").forEach((ns) => {
    if (/display\s*:\s*none/i.test(ns.innerHTML)) {
      issues.push({
        severity: "medium", type: "noscript-hide",
        title: "Noscript block hides page content when JS is off",
        detail: "A <noscript> tag contains CSS that hides other page elements when JavaScript is disabled.",
        why: "This doesn't actually hide content from LLMs (they don't apply CSS). But it makes manual testing misleading.",
      });
    }
  });

  const badChars = {
    "\u2019": { name: "curly apostrophe (right single quote)", code: "U+2019", fix: "remove or replace with nothing" },
    "\u2018": { name: "curly apostrophe (left single quote)", code: "U+2018", fix: "remove or replace with nothing" },
    "\u201C": { name: "left double smart quote", code: "U+201C", fix: "remove" },
    "\u201D": { name: "right double smart quote", code: "U+201D", fix: "remove" },
    "\u2014": { name: "em dash", code: "U+2014", fix: "replace with a single hyphen (-)" },
    "\u2013": { name: "en dash", code: "U+2013", fix: "replace with a single hyphen (-)" },
    "\u00A0": { name: "non-breaking space", code: "U+00A0", fix: "replace with a regular hyphen or remove" },
    "\u200B": { name: "zero-width space", code: "U+200B", fix: "remove" },
  };
  const badCharPattern = /[\u2018\u2019\u201C\u201D\u2014\u2013\u00A0\u200B]/;
  doc.querySelectorAll("a[href]").forEach((a) => {
    const href = a.getAttribute("href") || "";
    if (badCharPattern.test(href)) {
      const found = [];
      for (const [char, info] of Object.entries(badChars)) {
        if (href.includes(char)) found.push({ char, ...info });
      }
      let cleanHref = href;
      for (const [char, info] of Object.entries(badChars)) {
        if (info.fix.includes("hyphen")) cleanHref = cleanHref.replaceAll(char, "-");
        else cleanHref = cleanHref.replaceAll(char, "");
      }
      cleanHref = cleanHref.replace(/-{2,}/g, "-").replace(/-\//g, "/").replace(/\/-/g, "/");
      let highlighted = href;
      for (const f of found) highlighted = highlighted.replaceAll(f.char, `\u2192 ${f.char} \u2190`);
      const charList = found.map(f => `"${f.char}" \u2014 ${f.name} (${f.code}) \u2014 ${f.fix}`).join("\n");
      issues.push({
        severity: "high", type: "invalid-url",
        title: `Link URL contains invalid character${found.length > 1 ? "s" : ""}: ${found.map(f => f.name).join(", ")}`,
        detail: `href="${trunc(highlighted, 140)}"\n\nProblem character${found.length > 1 ? "s" : ""}:\n${charList}\n\nSuggested clean URL: ${trunc(cleanHref, 120)}`,
        why: `The character ${found.map(f => `"${f.char}" (${f.name})`).join(" and ")} is not a valid URL character. LLMs and crawlers will likely get a 404.`,
      });
    }
  });

  doc.querySelectorAll('[data-react-root],[id="root"],[id="app"],[id="__next"],[data-controller],[data-component]').forEach((el) => {
    if (strip(el.textContent).length < 20) {
      issues.push({
        severity: "medium", type: "empty-container",
        title: "Empty JS application container",
        detail: `<${el.tagName.toLowerCase()} id="${el.id||""}" class="${trunc(el.className,50)}"> \u2014 ${strip(el.textContent).length} chars of content`,
        why: "This container is likely populated by JavaScript after page load. Any content rendered inside it will be invisible to LLMs.",
      });
    }
  });

  const jsonLinkRe = /"(?:href|url|link|productLink|slug)"\s*:\s*"(\/[^"]+)"/g;
  let jm;
  const flaggedJsonLinks = new Set();
  while ((jm = jsonLinkRe.exec(html)) !== null) {
    const url = jm[1];
    if (flaggedJsonLinks.has(url)) continue;
    if (!doc.querySelector(`a[href="${url}"], a[href*="${url}"]`)) {
      flaggedJsonLinks.add(url);
      issues.push({
        severity: "medium", type: "json-only-link",
        title: "URL in JSON data but no matching crawlable link",
        detail: `URL: ${trunc(url,80)} \u2014 found in JSON but no <a href> equivalent`,
        why: "This URL exists in embedded data but not as a real hyperlink. LLMs may read the JSON but won't recognise it as a navigable link.",
      });
    }
  }

  doc.querySelectorAll('[class*="cookie"],[class*="consent"],[class*="gdpr"],[id*="cookie"],[id*="consent"]').forEach((el) => {
    const text = strip(el.textContent);
    if (text.length > 50) {
      issues.push({
        severity: "low", type: "consent-content",
        title: "Content inside cookie/consent wrapper",
        detail: `<${el.tagName.toLowerCase()} class="${trunc(el.className,50)}"> contains ${text.length} chars`,
        why: "Content inside consent-gated containers may not be accessible to all crawlers.",
      });
    }
  });

  doc.querySelectorAll("[data-background-image],[data-bg],[data-src-bg],[data-bg-src]").forEach((el) => {
    const bgUrl = el.getAttribute("data-background-image") || el.getAttribute("data-bg") || el.getAttribute("data-src-bg") || el.getAttribute("data-bg-src") || "";
    if (bgUrl) {
      issues.push({
        severity: "medium", type: "js-image",
        title: "Image loaded via JS data attribute (not visible to LLMs)",
        detail: `<${el.tagName.toLowerCase()}> data-background-image="${trunc(bgUrl, 80)}"`,
        why: "This image URL is in a data attribute that requires JavaScript to apply as a CSS background. LLMs won't see this image at all.",
      });
    }
  });

  const nofollowLinks = [];
  doc.querySelectorAll('a[rel*="nofollow"]').forEach((a) => {
    const href = a.getAttribute("href") || "";
    const text = strip(a.textContent).slice(0, 60);
    if (href && href !== "#") nofollowLinks.push({ href, text });
  });
  if (nofollowLinks.length > 0) {
    issues.push({
      severity: "low", type: "nofollow-links",
      title: `${nofollowLinks.length} link(s) with rel="nofollow"`,
      detail: nofollowLinks.slice(0, 5).map(l => `${trunc(l.href,50)} \u2014 "${trunc(l.text,30)}"`).join(" | "),
      why: 'Links with rel="nofollow" tell search engines not to pass link equity.',
    });
  }

  doc.querySelectorAll('[class*="trustpilot"],[data-businessunit-id],[class*="yotpo"],[class*="bazaarvoice"],[class*="review"],[id*="disqus"],[class*="elfsight"]').forEach((el) => {
    const text = strip(el.textContent);
    if (text.length < 30) {
      const widgetName = el.className?.includes("trustpilot") ? "Trustpilot" :
        el.className?.includes("yotpo") ? "Yotpo" :
        el.className?.includes("bazaarvoice") ? "Bazaarvoice" :
        el.id?.includes("disqus") ? "Disqus" : "Third-party widget";
      issues.push({
        severity: "medium", type: "widget-placeholder",
        title: `${widgetName} widget placeholder (empty until JS loads)`,
        detail: `<${el.tagName.toLowerCase()} class="${trunc(el.className,60)}"> \u2014 ${text.length} chars of content`,
        why: `This ${widgetName} widget is an empty container populated by external JavaScript. Reviews, ratings, and UGC loaded this way are invisible to LLMs.`,
      });
    }
  });

  doc.querySelectorAll("img[data-src]:not([src])").forEach((img) => {
    const dataSrc = img.getAttribute("data-src") || "";
    issues.push({
      severity: "medium", type: "lazy-no-src",
      title: "Image with data-src but no src attribute",
      detail: `<img data-src="${trunc(dataSrc,70)}"> \u2014 requires JS to load`,
      why: "This image has no src attribute \u2014 only data-src which requires JavaScript to swap in.",
    });
  });

  doc.querySelectorAll("[data-bv-show],[data-bv-product-id]").forEach((el) => {
    const bvType = el.getAttribute("data-bv-show") || "reviews";
    const text = strip(el.textContent);
    if (text.length < 50) {
      issues.push({
        severity: "high", type: "widget-placeholder",
        title: `Bazaarvoice "${bvType}" widget (empty \u2014 requires JS to load)`,
        detail: `<${el.tagName.toLowerCase()} data-bv-show="${bvType}"> \u2014 ${text.length} chars of content.`,
        why: "Bazaarvoice review widgets are empty placeholder elements populated by external JavaScript. All review content is invisible to LLMs.",
      });
    }
  });

  doc.querySelectorAll('[class*="read-more"],[class*="readmore"],[class*="show-more"],[class*="showmore"],[data-readmore],[class*="truncat"],[class*="text-clamp"],[class*="line-clamp"],[class*="ellipsis"]').forEach((el) => {
    const text = strip(el.textContent);
    if (text.length > 20) {
      issues.push({
        severity: "medium", type: "truncated-content",
        title: 'Content behind a "read more" / truncation pattern',
        detail: `<${el.tagName.toLowerCase()} class="${trunc(el.className,60)}"> \u2014 visible text: "${trunc(text,80)}"`,
        why: 'This content uses a "read more" expand pattern. LLMs will only see the truncated/visible portion.',
      });
    }
  });
  doc.querySelectorAll('[style*="line-clamp"],[style*="webkit-line-clamp"],[style*="max-height"][style*="overflow"]').forEach((el) => {
    const text = strip(el.textContent);
    if (text.length > 30) {
      issues.push({
        severity: "low", type: "truncated-content",
        title: "Content visually truncated via CSS",
        detail: `<${el.tagName.toLowerCase()} style="${trunc(el.getAttribute("style"),60)}"> \u2014 ${text.length} chars of text`,
        why: "This content is visually truncated via CSS. The full text IS in the HTML, so LLMs can read it.",
      });
    }
  });

  doc.querySelectorAll("iframe[data-src]:not([src]), [data-video-url], [data-video-id], [class*='video-placeholder'], [class*='video-container']:empty").forEach((el) => {
    const videoUrl = el.getAttribute("data-src") || el.getAttribute("data-video-url") || el.getAttribute("data-video-id") || "";
    issues.push({
      severity: "medium", type: "js-video",
      title: "Video embed requires JS to load",
      detail: `<${el.tagName.toLowerCase()} ${videoUrl ? `data-src="${trunc(videoUrl,60)}"` : `class="${trunc(el.className,60)}"`}>`,
      why: "This video element needs JavaScript to initialise. LLMs won't see the video content.",
    });
  });

  doc.querySelectorAll("[data-component],[data-widget],[data-module],[data-carousel],[data-slider],[data-recommendations]").forEach((el) => {
    const text = strip(el.textContent);
    const tagName = el.tagName.toLowerCase();
    if (text.length < 15 && tagName !== "script" && tagName !== "link") {
      const componentName = el.getAttribute("data-component") || el.getAttribute("data-widget") || el.getAttribute("data-module") || el.getAttribute("data-carousel") || el.getAttribute("data-slider") || el.getAttribute("data-recommendations") || "unknown";
      issues.push({
        severity: "medium", type: "empty-widget",
        title: `Empty JS component: "${trunc(componentName,40)}"`,
        detail: `<${tagName} data-component="${trunc(componentName,50)}"> \u2014 ${text.length} chars of content`,
        why: "This JavaScript component placeholder gets populated after page load. Content loaded this way is invisible to LLMs.",
      });
    }
  });

  // Deduplicate
  const deduped = [];
  const seen = new Map();
  for (const issue of issues) {
    let key = issue.type + "|";
    if (issue.type === "invalid-url") {
      const hrefMatch = issue.detail.match(/href="([^"]+)"/);
      key += hrefMatch ? hrefMatch[1] : issue.detail;
    } else if (issue.type === "fake-link" || issue.type === "hidden-link") {
      const hrefMatch = issue.detail.match(/href="([^"]+)"/) || issue.detail.match(/onclick="([^"]+)"/);
      key += hrefMatch ? hrefMatch[1] : issue.detail;
    } else if (issue.type === "js-image") {
      const urlMatch = issue.detail.match(/data-background-image="([^"]+)"/);
      key += urlMatch ? urlMatch[1] : issue.detail;
    } else if (issue.type === "widget-placeholder") {
      key += issue.title;
    } else {
      key += issue.detail;
    }
    if (seen.has(key)) { seen.get(key).count += 1; }
    else { const entry = { ...issue, count: 1 }; seen.set(key, entry); deduped.push(entry); }
  }
  return deduped;
}

/* ═══════════════════════════════════════════════════════════════════
   LAYER 3 — MEANINGFUL DIFF
   ═══════════════════════════════════════════════════════════════════ */
function computeDiff(src, ren) {
  if (!ren) return null;
  const normUrl = (href) => {
    let u = (href || "").trim().replace(/^https?:\/\/[^\/]+/i, "");
    if (u.length > 1 && u.endsWith("/")) u = u.slice(0, -1);
    u = u.replace(/[?&](utm_[^&=]+=|ref=|source=|fbclid=|gclid=|mc_[^&=]+=)[^&]*/gi, "");
    return u.replace(/\?$/, "").replace(/\?&/, "?").toLowerCase();
  };
  const normImg = (src) => {
    let u = (src || "").trim().replace(/^https?:\/\/[^\/]+/i, "");
    u = u.replace(/[?&](w|h|width|height|size|resize|quality|q|format|f)=[^&]*/gi, "");
    return u.replace(/\?$/, "").toLowerCase();
  };

  const srcTexts = new Set(src.text.map(t => t.text));
  const srcHrefs = new Set(src.links.map(l => normUrl(l.href)));
  const srcH = new Set(src.headings.map(h => h.level + h.text));
  const srcSchemaKeys = new Set(src.schema.map(s => JSON.stringify(s.parsed?.["@type"] || s.raw)));
  const srcImgs = new Set(src.images.map(i => normImg(i.src)));

  let addedText = ren.text.filter(t => !srcTexts.has(t.text));
  let addedLinks = ren.links.filter(l => !srcHrefs.has(normUrl(l.href)));
  const addedHeadings = ren.headings.filter(h => !srcH.has(h.level + h.text));
  const addedSchema = ren.schema.filter(s => !srcSchemaKeys.has(JSON.stringify(s.parsed?.["@type"] || s.raw)));
  const addedImages = ren.images.filter(i => !srcImgs.has(normImg(i.src)));

  const extRe = /chrome-extension:\/\/|moz-extension:\/\//i;
  const trackRe = /gtm|analytics|tracking|dataLayer|fbq|_ga|cookie|gorgias|ometria|widget|rollbar|doubleclick|google-analytics|googletagmanager|hotjar|clarity\.ms|hubspot|segment\.io|mixpanel|amplitude/i;
  const ttsRe = /^🇺🇸|^🇬🇧|Microsoft\s+(David|George|Hazel)|Google\s+(US|UK)|text.to.speech|reader.?mode|OpenDyslexic/i;
  const extUiRe = /chrome-extension|moz-extension|readermode\.io|Settings\s*page|Share\s*to\s*a\s*new\s*group|Default\s*translation\s*language/i;

  addedText = addedText.filter(t => t.text.length >= 20 && !trackRe.test(t.text) && !ttsRe.test(t.text) && !extUiRe.test(t.text));
  addedLinks = addedLinks.filter(l => !extRe.test(l.href) && !trackRe.test(l.href) && !l.href.startsWith("data:") && !l.href.startsWith("blob:") && !l.href.startsWith("#/") && !/readermode\.io|chrome\.google\.com\/webstore/i.test(l.href));
  let addedImgs = addedImages.filter(i => !extRe.test(i.src) && !trackRe.test(i.src) && !i.src.startsWith("data:") && !i.src.startsWith("blob:"));

  return {
    text: addedText, links: addedLinks,
    headings: addedHeadings.filter(h => !extUiRe.test(h.text) && !ttsRe.test(h.text)),
    schema: addedSchema, images: addedImgs,
  };
}

/* ═══════════════════════════════════════════════════════════════════
   LAYER 4 — PROMOTE DIFF TO ISSUES
   ═══════════════════════════════════════════════════════════════════ */
function promoteDiffToIssues(diff) {
  if (!diff) return [];
  const issues = [];
  const productLinks = diff.links.filter(l => /\/product[s]?\//i.test(l.href));
  if (productLinks.length > 0) issues.push({ severity: "high", type: "js-only-product-links", title: `${productLinks.length} product link(s) only load via JavaScript`, detail: productLinks.slice(0,8).map(l => `${trunc(l.href,60)} \u2014 "${trunc(l.text,40)}"`).join("\n"), why: "These product links are completely invisible to LLMs.", count: 1 });
  const contentLinks = diff.links.filter(l => !(/\/product[s]?\//i.test(l.href)) && !(/youtube|instagram|twitter|facebook|tiktok|pinterest|linkedin/i.test(l.href)));
  if (contentLinks.length > 0) issues.push({ severity: "medium", type: "js-only-content-links", title: `${contentLinks.length} content link(s) only load via JavaScript`, detail: contentLinks.slice(0,6).map(l => `${trunc(l.href,60)} \u2014 "${trunc(l.text,40)}"`).join("\n"), why: "These internal/content links are only in the rendered DOM. LLMs won't discover these pages.", count: 1 });
  const socialLinks = diff.links.filter(l => /youtube|instagram|twitter|facebook|tiktok|pinterest|linkedin/i.test(l.href));
  if (socialLinks.length > 0) issues.push({ severity: "low", type: "js-only-social-links", title: `${socialLinks.length} social link(s) only load via JavaScript`, detail: socialLinks.map(l => trunc(l.href,60)).join("\n"), why: "Social profile links are JS-only. Low impact.", count: 1 });
  const highH = diff.headings.filter(h => h.level === "H1" || h.level === "H2");
  if (highH.length > 0) issues.push({ severity: "high", type: "js-only-headings-high", title: `${highH.length} key heading(s) only exist after JavaScript runs`, detail: highH.map(h => `${h.level}: "${trunc(h.text,60)}"`).join("\n"), why: "H1/H2 headings invisible to LLMs means major page sections are missing.", count: 1 });
  const medH = diff.headings.filter(h => h.level !== "H1" && h.level !== "H2");
  if (medH.length > 0) issues.push({ severity: "medium", type: "js-only-headings-med", title: `${medH.length} sub-heading(s) only exist after JavaScript runs`, detail: medH.map(h => `${h.level}: "${trunc(h.text,60)}"`).join("\n"), why: "Sub-headings that only appear after JS execution.", count: 1 });
  const mt = diff.text.filter(t => t.text.length > 30);
  const pt = mt.filter(t => /price|£|\$|€|add to|basket|cart|delivery|stock|size/i.test(t.text));
  const ot = mt.filter(t => !/price|£|\$|€|add to|basket|cart|delivery|stock|size/i.test(t.text));
  if (pt.length > 0) issues.push({ severity: "high", type: "js-only-product-content", title: `${pt.length} product-related text block(s) only load via JavaScript`, detail: pt.slice(0,5).map(t => `"${trunc(t.text,80)}"`).join("\n"), why: "Product information only in rendered DOM. LLMs cannot see it.", count: 1 });
  if (ot.length > 3) issues.push({ severity: "medium", type: "js-only-text-content", title: `${ot.length} text block(s) only load via JavaScript`, detail: ot.slice(0,5).map(t => `"${trunc(t.text,80)}"`).join("\n"), why: "Text content only appears after JS execution.", count: 1 });
  if (diff.schema.length > 0) issues.push({ severity: "high", type: "js-only-schema", title: `${diff.schema.length} structured data block(s) only exist after JavaScript runs`, detail: diff.schema.map(s => `@type: ${s.parsed?.["@type"] || "unknown"}`).join("\n"), why: "JSON-LD injected by JavaScript is invisible to LLMs.", count: 1 });
  if (diff.images.length > 3) issues.push({ severity: "medium", type: "js-only-images", title: `${diff.images.length} image(s) only load via JavaScript`, detail: diff.images.slice(0,5).map(i => `${trunc(i.src,60)} \u2014 alt: "${trunc(i.alt,30) || "none"}"`).join("\n"), why: "These images only appear after JavaScript runs.", count: 1 });
  return issues;
}

/* ═══════════════════════════════════════════════════════════════════
   AGENT READINESS — Action Zone Detection & Audit
   ═══════════════════════════════════════════════════════════════════ */
function getNearbyText(el, maxChars = 200) {
  const parts = [];
  let walker = el.parentElement;
  for (let i = 0; i < 4 && walker; i++) {
    const heading = walker.querySelector("h1,h2,h3,h4,h5,h6");
    if (heading) { parts.push(heading.textContent.trim()); break; }
    walker = walker.parentElement;
  }
  const legend = el.closest("fieldset")?.querySelector("legend")?.textContent?.trim();
  if (legend) parts.push(legend);
  const ariaLabel = el.getAttribute("aria-label");
  if (ariaLabel) parts.push(ariaLabel);
  return parts.join(" | ").slice(0, maxChars);
}

function classifyForm(form) {
  const html = form.outerHTML.toLowerCase();
  const text = form.textContent.toLowerCase();
  const inputs = Array.from(form.querySelectorAll("input,select,textarea"));
  const inputTypes = inputs.map(i => i.getAttribute("type") || "text");
  const inputNames = inputs.map(i => (i.getAttribute("name") || i.getAttribute("id") || "").toLowerCase());
  const allNames = inputNames.join(" ");
  const buttonText = Array.from(form.querySelectorAll("button,input[type=submit]")).map(b => b.textContent?.trim() || b.value || "").join(" ").toLowerCase();

  if (form.getAttribute("role") === "search" || inputTypes.includes("search") || /search|query|q\b/.test(allNames) && inputs.length <= 2) return { category: "search", label: "Site search", confidence: 0.95 };
  if (inputTypes.includes("password") && /log.?in|sign.?in/i.test(text + " " + buttonText)) return { category: "login", label: "Login / Sign in", confidence: 0.95 };
  if (inputTypes.includes("password") && /register|sign.?up|create.?account/i.test(text + " " + buttonText)) return { category: "registration", label: "Account registration", confidence: 0.9 };
  if (inputs.length <= 3 && (inputTypes.includes("email") || /email/.test(allNames)) && !inputTypes.includes("password") && /subscri|newsletter|updates|sign.?up|mailing|notify/i.test(text + " " + buttonText + " " + html)) return { category: "newsletter", label: "Newsletter / email signup", confidence: 0.9 };
  if (/book|reserv|availab|check.?in|check.?out|arrival|depart|guest/i.test(text + " " + allNames + " " + buttonText) || (inputTypes.includes("date") && /date|arrival|depart|check/i.test(allNames))) return { category: "booking", label: "Booking / reservation form", confidence: 0.85 };
  if (/contact|enquir|inquir|get.?in.?touch|message|feedback/i.test(text + " " + buttonText + " " + html) || (/name/.test(allNames) && /email/.test(allNames) && /message|comment|body|text/.test(allNames))) return { category: "contact", label: "Contact / enquiry form", confidence: 0.85 };
  if (/checkout|payment|pay.?now|place.?order|billing|shipping.?address/i.test(text + " " + buttonText + " " + allNames)) return { category: "checkout", label: "Checkout / payment", confidence: 0.9 };
  if (/add.?to.?(cart|basket|bag)|buy.?now/i.test(buttonText + " " + text)) return { category: "add-to-cart", label: "Add to cart / purchase", confidence: 0.9 };
  if (/download|get.?(the|your|our|free)|access|whitepaper|ebook|guide|brochure/i.test(text + " " + buttonText)) return { category: "download", label: "Download / lead generation", confidence: 0.8 };
  if (/appointment|schedule|calendar|time.?slot|consultation/i.test(text + " " + allNames + " " + buttonText)) return { category: "appointment", label: "Appointment / scheduling", confidence: 0.85 };
  if (/filter|sort|refine|facet/i.test(html) && form.querySelectorAll("input[type=checkbox],input[type=radio],select").length > 3) return { category: "filter", label: "Product/content filter", confidence: 0.7, skip: true };
  if (inputs.length > 0) return { category: "other-form", label: "Form (unclassified)", confidence: 0.5 };
  return null;
}

function classifyCTA(el) {
  const text = (el.textContent || "").trim().toLowerCase();
  const ariaLabel = (el.getAttribute("aria-label") || "").toLowerCase();
  const combined = text + " " + ariaLabel;
  if (text.length < 2 && !ariaLabel) return null;
  if (/^(home|about|blog|news|faq|terms|privacy|sitemap|menu|close|back|next|prev)$/i.test(text)) return null;
  if (/add.?to.?(cart|basket|bag)|buy.?now|purchase/i.test(combined)) return { category: "add-to-cart", label: `Add to cart: "${text.slice(0,40)}"`, confidence: 0.95 };
  if (/^(book|reserve|check.?availab|make.?a?.?reserv|book.?now|reserve.?now)/i.test(combined)) return { category: "booking", label: `Booking CTA: "${text.slice(0,40)}"`, confidence: 0.9 };
  if (/^(subscribe|sign.?up|join|get.?updates|notify)/i.test(combined)) return { category: "newsletter", label: `Subscribe CTA: "${text.slice(0,40)}"`, confidence: 0.85 };
  if (/^(contact|get.?in.?touch|enquire|request.?a?.?quote|send.?message|email.?us)/i.test(combined)) return { category: "contact", label: `Contact CTA: "${text.slice(0,40)}"`, confidence: 0.85 };
  if (/^(download|get.?(the|your|our|free)|access.?(the|your))/i.test(combined)) return { category: "download", label: `Download CTA: "${text.slice(0,40)}"`, confidence: 0.85 };
  if (/^(schedule|book.?a?.?(call|demo|appointment|consultation)|request.?a?.?(demo|call))/i.test(combined)) return { category: "appointment", label: `Appointment CTA: "${text.slice(0,40)}"`, confidence: 0.85 };
  if (/^(log.?in|sign.?in|create.?account|register|sign.?up|get.?started)$/i.test(text)) return { category: "login", label: `Auth CTA: "${text.slice(0,40)}"`, confidence: 0.8 };
  if (/^(apply|submit|request|claim|redeem|activate)/i.test(combined)) return { category: "other-action", label: `Action CTA: "${text.slice(0,40)}"`, confidence: 0.75 };
  return null;
}

function detectActionZones(doc, html) {
  const zones = [];
  let idCounter = 0;
  const makeId = () => `action-${++idCounter}`;

  // 1. FORMS
  doc.querySelectorAll("form").forEach(form => {
    const classification = classifyForm(form);
    if (!classification || classification.skip) return;
    const inputs = Array.from(form.querySelectorAll("input:not([type=hidden]),select,textarea"));
    const buttons = Array.from(form.querySelectorAll("button,input[type=submit],input[type=button]"));
    zones.push({ id: makeId(), type: "form", category: classification.category, label: classification.label, confidence: classification.confidence, elementDesc: `<form> with ${inputs.length} input(s), ${buttons.length} button(s)`, elementSnippet: `<form${form.id ? ` id="${form.id}"` : ""}${form.className ? ` class="${form.className.toString().slice(0,50)}"` : ""}${form.action ? ` action="${form.action.slice(0,60)}"` : ""}>`, nearbyText: getNearbyText(form), element: form, inputCount: inputs.length, buttonCount: buttons.length, source: "auto-detected" });
  });

  // 2. STANDALONE CTAs
  const seenCTAText = new Set();
  doc.querySelectorAll("a[href], button").forEach(el => {
    if (el.closest("form")) return;
    if (el.closest("nav") || el.closest("[role='navigation']")) return;
    const isInHeader = el.closest("header") && !el.closest("main");
    const isInFooter = el.closest("footer");
    const classification = classifyCTA(el);
    if (!classification) return;
    const dedupeKey = classification.category + "|" + (el.textContent || "").trim().toLowerCase().slice(0, 30);
    if (seenCTAText.has(dedupeKey)) return;
    seenCTAText.add(dedupeKey);
    const confidence = (isInHeader || isInFooter) ? classification.confidence * 0.7 : classification.confidence;
    const tag = el.tagName.toLowerCase();
    const href = el.getAttribute("href") || "";
    zones.push({ id: makeId(), type: "cta", category: classification.category, label: classification.label, confidence, elementDesc: `<${tag}>${tag === "a" ? ` href="${href.slice(0,50)}"` : ""}`, elementSnippet: `<${tag}${el.className ? ` class="${el.className.toString().slice(0,50)}"` : ""}${href ? ` href="${href.slice(0,60)}"` : ""}>${(el.textContent || "").trim().slice(0,40)}</${tag}>`, nearbyText: getNearbyText(el), element: el, isLink: tag === "a", href, source: "auto-detected" });
  });

  // 3. THIRD-PARTY WIDGETS
  const widgetPatterns = [
    { selector: 'iframe[src*="fareharbor"]', category: "booking", name: "FareHarbor", type: "iframe" },
    { selector: 'iframe[src*="bookingkit"]', category: "booking", name: "Bookingkit", type: "iframe" },
    { selector: 'iframe[src*="rezdy"]', category: "booking", name: "Rezdy", type: "iframe" },
    { selector: 'iframe[src*="checkfront"]', category: "booking", name: "Checkfront", type: "iframe" },
    { selector: '[data-fareharbor]', category: "booking", name: "FareHarbor", type: "widget" },
    { selector: 'iframe[src*="calendly"]', category: "appointment", name: "Calendly", type: "iframe" },
    { selector: 'iframe[src*="acuityscheduling"]', category: "appointment", name: "Acuity", type: "iframe" },
    { selector: '[class*="calendly"]', category: "appointment", name: "Calendly", type: "widget" },
    { selector: 'iframe[src*="stripe"]', category: "checkout", name: "Stripe", type: "iframe" },
    { selector: 'iframe[src*="paypal"]', category: "checkout", name: "PayPal", type: "iframe" },
    { selector: '[data-stripe]', category: "checkout", name: "Stripe Elements", type: "widget" },
    { selector: '#intercom-container', category: "chat", name: "Intercom", type: "widget" },
    { selector: '[class*="intercom"]', category: "chat", name: "Intercom", type: "widget" },
    { selector: '#drift-widget', category: "chat", name: "Drift", type: "widget" },
    { selector: '[class*="zE-"]', category: "chat", name: "Zendesk", type: "widget" },
    { selector: '#tidio-chat', category: "chat", name: "Tidio", type: "widget" },
    { selector: '[class*="crisp"]', category: "chat", name: "Crisp", type: "widget" },
    { selector: '#hubspot-messages-iframe-container', category: "chat", name: "HubSpot Chat", type: "widget" },
    { selector: 'iframe[src*="livechat"]', category: "chat", name: "LiveChat", type: "iframe" },
  ];
  const seenWidgets = new Set();
  widgetPatterns.forEach(wp => { doc.querySelectorAll(wp.selector).forEach(el => { if (seenWidgets.has(wp.name)) return; seenWidgets.add(wp.name); zones.push({ id: makeId(), type: "widget", category: wp.category, label: `${wp.name} ${wp.category} widget`, confidence: 0.95, elementDesc: `${wp.type === "iframe" ? "iframe" : "widget"} (${wp.name})`, elementSnippet: `<${el.tagName.toLowerCase()} ${wp.type === "iframe" ? `src="${(el.getAttribute("src") || "").slice(0,60)}"` : `class="${(el.className || "").toString().slice(0,50)}"`}>`, nearbyText: getNearbyText(el), element: el, widgetName: wp.name, widgetType: wp.type, source: "auto-detected" }); }); });

  const scriptSrcs = Array.from(doc.querySelectorAll("script[src]")).map(s => s.getAttribute("src") || "");
  const scriptWidgets = [{ pattern: /intercom/i, name: "Intercom", category: "chat" },{ pattern: /drift/i, name: "Drift", category: "chat" },{ pattern: /zendesk|zopim/i, name: "Zendesk", category: "chat" },{ pattern: /tidio/i, name: "Tidio", category: "chat" },{ pattern: /livechat/i, name: "LiveChat", category: "chat" },{ pattern: /crisp\.chat/i, name: "Crisp", category: "chat" },{ pattern: /calendly/i, name: "Calendly", category: "appointment" },{ pattern: /fareharbor/i, name: "FareHarbor", category: "booking" }];
  scriptSrcs.forEach(src => { scriptWidgets.forEach(sw => { if (sw.pattern.test(src) && !seenWidgets.has(sw.name)) { seenWidgets.add(sw.name); zones.push({ id: makeId(), type: "widget", category: sw.category, label: `${sw.name} (detected via script)`, confidence: 0.85, elementDesc: `Script: ${src.slice(0, 60)}`, elementSnippet: `<script src="${src.slice(0,80)}">`, nearbyText: "", element: null, widgetName: sw.name, widgetType: "script", source: "auto-detected" }); } }); });

  // 4. BLOCKERS
  const blockerPatterns = [
    { selector: '[class*="g-recaptcha"],[data-sitekey]', name: "reCAPTCHA", type: "captcha" },
    { selector: '[class*="h-captcha"],[data-hcaptcha]', name: "hCaptcha", type: "captcha" },
    { selector: '[class*="cf-turnstile"]', name: "Cloudflare Turnstile", type: "captcha" },
    { selector: 'script[src*="akamai"]', name: "Akamai Bot Manager", type: "bot-detection" },
    { selector: 'script[src*="datadome"]', name: "DataDome", type: "bot-detection" },
    { selector: 'script[src*="perimeterx"],script[src*="human.com"]', name: "HUMAN (PerimeterX)", type: "bot-detection" },
    { selector: '[class*="onetrust"],[id*="onetrust"]', name: "OneTrust", type: "consent" },
    { selector: '[id*="CybotCookiebot"],[class*="cookiebot"]', name: "CookieBot", type: "consent" },
    { selector: '[class*="didomi"],[id*="didomi"]', name: "Didomi", type: "consent" },
    { selector: '[class*="trustarc"],[id*="trustarc"]', name: "TrustArc", type: "consent" },
    { selector: '[id*="quantcast"],[class*="qc-cmp"]', name: "Quantcast", type: "consent" },
    { selector: '[class*="cookie-banner"],[class*="cookie-notice"],[class*="cookie-consent"],[id*="cookie-banner"],[id*="cookie-notice"]', name: "Cookie banner", type: "consent" },
  ];
  const captchaScripts = [{ pattern: /recaptcha/i, name: "reCAPTCHA", type: "captcha" },{ pattern: /hcaptcha/i, name: "hCaptcha", type: "captcha" },{ pattern: /challenges\.cloudflare/i, name: "Cloudflare Turnstile", type: "captcha" },{ pattern: /datadome/i, name: "DataDome", type: "bot-detection" },{ pattern: /perimeterx|human\.com.*px/i, name: "HUMAN (PerimeterX)", type: "bot-detection" }];
  const seenBlockers = new Set();
  blockerPatterns.forEach(bp => { try { doc.querySelectorAll(bp.selector).forEach(el => { if (seenBlockers.has(bp.name)) return; seenBlockers.add(bp.name); zones.push({ id: makeId(), type: "blocker", category: bp.type, label: `${bp.name} (${bp.type === "captcha" ? "CAPTCHA" : bp.type === "bot-detection" ? "bot detection" : "cookie consent"})`, confidence: 0.95, elementDesc: bp.name, elementSnippet: `<${el.tagName.toLowerCase()} class="${(el.className || "").toString().slice(0,50)}">`, nearbyText: "", element: el, blockerName: bp.name, blockerType: bp.type, source: "auto-detected" }); }); } catch(e) {} });
  scriptSrcs.forEach(src => { captchaScripts.forEach(cs => { if (cs.pattern.test(src) && !seenBlockers.has(cs.name)) { seenBlockers.add(cs.name); zones.push({ id: makeId(), type: "blocker", category: cs.type, label: `${cs.name} (detected via script)`, confidence: 0.9, elementDesc: `Script: ${src.slice(0, 60)}`, elementSnippet: `<script src="${src.slice(0,80)}">`, nearbyText: "", element: null, blockerName: cs.name, blockerType: cs.type, source: "auto-detected" }); } }); });

  // 5. SCHEMA ACTIONS
  doc.querySelectorAll('script[type="application/ld+json"]').forEach(script => { try { const data = JSON.parse(script.textContent); const items = Array.isArray(data) ? data : [data]; items.forEach(item => { const actions = []; if (item.potentialAction) { const pa = Array.isArray(item.potentialAction) ? item.potentialAction : [item.potentialAction]; actions.push(...pa); } if (item["@graph"]) { item["@graph"].forEach(g => { if (g.potentialAction) { const pa = Array.isArray(g.potentialAction) ? g.potentialAction : [g.potentialAction]; actions.push(...pa); } }); } actions.forEach(action => { const actionType = action["@type"] || "Unknown"; zones.push({ id: makeId(), type: "schema-action", category: "schema", label: `Schema: ${actionType}`, confidence: 0.9, elementDesc: `potentialAction: ${actionType}`, elementSnippet: JSON.stringify(action).slice(0, 120), nearbyText: action.target ? `Target: ${typeof action.target === "string" ? action.target : JSON.stringify(action.target).slice(0,80)}` : "", element: null, actionType, source: "auto-detected" }); }); }); } catch(e) {} });

  zones.sort((a, b) => { if (a.type === "blocker" && b.type !== "blocker") return -1; if (b.type === "blocker" && a.type !== "blocker") return 1; return b.confidence - a.confidence; });
  return zones;
}

function matchUserActions(userActionTexts, existingZones, doc) {
  const newZones = [];
  let idCounter = existingZones.length;
  userActionTexts.forEach(actionText => {
    const text = actionText.trim().toLowerCase();
    if (!text) return;
    const existingMatch = existingZones.find(z => { const zLabel = z.label.toLowerCase(); const actionWords = text.split(/\s+/).filter(w => w.length > 3); return actionWords.some(w => zLabel.includes(w) || z.category.toLowerCase().includes(w)); });
    if (existingMatch) { existingMatch.userConfirmed = true; existingMatch.userAction = actionText; return; }
    const keywords = text.split(/\s+/).filter(w => w.length > 2);
    let bestMatch = null, bestScore = 0;
    doc.querySelectorAll("button, a, form, input[type=submit]").forEach(el => { const elText = (el.textContent || "").toLowerCase() + " " + (el.getAttribute("aria-label") || "").toLowerCase(); let score = 0; keywords.forEach(kw => { if (elText.includes(kw)) score++; }); if (score > bestScore) { bestScore = score; bestMatch = el; } });
    if (bestMatch && bestScore >= 1) { const tag = bestMatch.tagName.toLowerCase(); newZones.push({ id: `action-${++idCounter}`, type: tag === "form" ? "form" : "cta", category: "user-defined", label: actionText, confidence: 0.6 + (bestScore * 0.1), elementDesc: `<${tag}> matched by text similarity`, elementSnippet: `<${tag}${bestMatch.className ? ` class="${bestMatch.className.toString().slice(0,50)}"` : ""}>${(bestMatch.textContent || "").trim().slice(0,40)}`, nearbyText: getNearbyText(bestMatch), element: bestMatch, userDefined: true, userAction: actionText, source: "user-defined" }); }
    else { newZones.push({ id: `action-${++idCounter}`, type: "unmatched", category: "user-defined", label: actionText, confidence: 0, elementDesc: "No matching element found in HTML", elementSnippet: "", nearbyText: "", element: null, userDefined: true, userAction: actionText, source: "user-defined" }); }
  });
  return newZones;
}

function auditActionZone(zone, doc) {
  const issues = [];
  const el = zone.element;
  if (zone.type === "blocker") {
    if (zone.blockerType === "captcha") issues.push({ severity: "high", check: "captcha-present", title: `${zone.blockerName} will block AI agents`, detail: "CAPTCHAs prevent automated interaction. No current AI agent can solve these reliably.", impact: "Any form or action protected by this CAPTCHA will be inaccessible to AI agents." });
    else if (zone.blockerType === "bot-detection") issues.push({ severity: "high", check: "bot-detection-present", title: `${zone.blockerName} may block or challenge AI agents`, detail: "Bot detection services fingerprint automated browsers and can block or serve challenges to AI agents.", impact: "AI agents may be blocked entirely, or served degraded/different page content." });
    else if (zone.blockerType === "consent") issues.push({ severity: "medium", check: "consent-overlay", title: `${zone.blockerName} consent overlay may block interaction`, detail: "Cookie consent overlays sit on top of page content. AI agents need to dismiss these before interacting with anything else.", impact: "Agents that can't dismiss the consent dialog won't be able to interact with page elements behind it." });
    return { zone, issues, score: zone.blockerType === "consent" ? "warning" : "blocker" };
  }
  if (zone.type === "unmatched") { issues.push({ severity: "high", check: "no-matching-element", title: `No HTML element found for: "${zone.label}"`, detail: "No form, button, or link in the page source matches this action.", impact: "This action may only be available via JavaScript, behind a login, or may not exist on this page." }); return { zone, issues, score: "poor" }; }
  if (zone.type === "schema-action") { if (!zone.nearbyText || !zone.nearbyText.includes("Target:")) issues.push({ severity: "medium", check: "schema-no-target", title: `${zone.actionType} has no target URL`, detail: "This schema action doesn't specify a target URL pattern.", impact: "Agents can see the action exists but can't programmatically use it." }); return { zone, issues, score: issues.length === 0 ? "good" : "partial" }; }
  if (zone.type === "widget") {
    if (zone.widgetType === "iframe") issues.push({ severity: "high", check: "iframe-widget", title: `${zone.widgetName} runs in an iframe \u2014 agents can't cross this boundary`, detail: "This widget loads in a separate iframe. AI agents on the parent page cannot interact with iframe content.", impact: `The entire ${zone.category} flow (${zone.widgetName}) is inaccessible to AI agents.` });
    if (zone.widgetType === "script") issues.push({ severity: "medium", check: "js-widget", title: `${zone.widgetName} loads entirely via JavaScript`, detail: "This widget is injected by an external script and doesn't exist in raw HTML.", impact: "Agents parsing HTML source won't find this. Browser-based agents (Claude in Chrome, ChatGPT Operator) may interact after it loads." });
    if (zone.category === "chat") issues.push({ severity: "low", check: "chat-widget", title: "Chat widgets are generally not agent-targetable", detail: `${zone.widgetName} is a live chat widget. AI agents typically can't initiate conversations through embedded widgets.`, impact: "Low impact unless live chat is required to complete a booking or enquiry." });
    return { zone, issues, score: issues.some(i => i.severity === "high") ? "poor" : "partial" };
  }
  if (!el) { issues.push({ severity: "medium", check: "no-element-ref", title: "Element reference lost", detail: "The HTML element for this action zone couldn't be inspected.", impact: "Partial analysis only." }); return { zone, issues, score: "partial" }; }

  if (zone.type === "form") {
    const inputs = Array.from(el.querySelectorAll("input:not([type=hidden]),select,textarea"));
    const buttons = Array.from(el.querySelectorAll("button,input[type=submit],input[type=button]"));
    const unlabelled = inputs.filter(input => { const id = input.getAttribute("id"); return !( (id && el.querySelector(`label[for="${id}"]`)) || input.closest("label") || input.getAttribute("aria-label") || input.getAttribute("aria-labelledby") || input.getAttribute("placeholder") || input.getAttribute("title") ); });
    if (unlabelled.length > 0) issues.push({ severity: "high", check: "unlabelled-inputs", title: `${unlabelled.length} form field(s) have no label, aria-label, or placeholder`, detail: unlabelled.map(i => `<${i.tagName.toLowerCase()} type="${i.getAttribute("type") || "text"}" name="${i.getAttribute("name") || "?"}">`).slice(0,5).join("\n"), impact: "AI agents can't determine what to enter in these fields." });
    const placeholderOnly = inputs.filter(input => { const id = input.getAttribute("id"); return !((id && el.querySelector(`label[for="${id}"]`)) || input.closest("label") || input.getAttribute("aria-label")) && input.getAttribute("placeholder"); });
    if (placeholderOnly.length > 0) issues.push({ severity: "low", check: "placeholder-only-labels", title: `${placeholderOnly.length} field(s) rely on placeholder as the only label`, detail: placeholderOnly.map(i => `<input placeholder="${i.getAttribute("placeholder")}">`).slice(0,3).join("\n"), impact: "Most agents can read placeholders, but proper <label> elements are more reliable." });
    if (buttons.length === 0) issues.push({ severity: "high", check: "no-submit-button", title: "Form has no visible submit button", detail: "No <button> or <input type='submit'> found.", impact: "AI agents look for a submit button to complete forms. Without one, the agent can't submit." });
    buttons.forEach(btn => { const btnText = (btn.textContent || "").trim(); if (!btnText && !btn.getAttribute("value") && !btn.getAttribute("aria-label")) issues.push({ severity: "medium", check: "empty-submit-button", title: "Submit button has no text or aria-label", detail: `<${btn.tagName.toLowerCase()} type="${btn.getAttribute("type") || "?"}">`, impact: "Agents can't determine what this button does." }); });
    if (el.querySelectorAll('[class*="select"][role]:not(select),[class*="dropdown"][role]:not(select),[class*="combobox"]:not(select)').length > 0) issues.push({ severity: "medium", check: "custom-select", title: "Custom dropdown(s) instead of native <select>", detail: "Custom JS dropdowns require specific ARIA roles to be agent-accessible.", impact: "Browser-based agents may struggle. Native <select> is universally understood." });
    if (el.querySelectorAll('[class*="datepicker"],[class*="date-picker"],[data-datepicker],[class*="flatpickr"],[class*="pikaday"]').length > 0) issues.push({ severity: "medium", check: "custom-datepicker", title: "Custom date picker widget detected", detail: "JS-based date pickers are harder for agents than native <input type='date'>.", impact: "Browser-based agents may struggle to select dates." });
    if (el.querySelectorAll("input[type=file]").length > 0) issues.push({ severity: "medium", check: "file-upload-required", title: "Form requires file upload", detail: "File upload fields require agents to have local file access.", impact: "Most AI agents can't upload files." });
    if (el.querySelector('[class*="g-recaptcha"],[class*="h-captcha"],[class*="cf-turnstile"],[data-sitekey]')) issues.push({ severity: "high", check: "form-captcha", title: "This form is protected by a CAPTCHA", detail: "A CAPTCHA challenge is embedded directly in this form.", impact: "AI agents cannot solve CAPTCHAs. This form is inaccessible to all current agents." });
  } else if (zone.type === "cta") {
    if (zone.isLink) { const href = el.getAttribute("href") || ""; if (href === "#" || href.startsWith("javascript:")) issues.push({ severity: "high", check: "fake-link", title: "CTA uses a fake link (href='#' or javascript:)", detail: `<a href="${href}">${(el.textContent || "").trim().slice(0,40)}</a>`, impact: "This link relies on a JS click handler. LLM crawlers can't follow it." }); }
    const tag = el.tagName.toLowerCase();
    if (!zone.isLink && tag !== "button" && tag !== "input" && el.getAttribute("role") !== "button" && el.getAttribute("role") !== "link") issues.push({ severity: "high", check: "non-semantic-cta", title: `CTA is a <${tag}> without role="button"`, detail: `<${tag} class="${(el.className || "").toString().slice(0,40)}">${(el.textContent || "").trim().slice(0,40)}</${tag}>`, impact: "AI agents can't identify this as interactive. Use <button>, <a>, or add role='button'." });
    const ctaText = (el.textContent || "").trim().toLowerCase();
    if (/^(click here|learn more|more|here|go|submit|ok|yes)$/i.test(ctaText)) issues.push({ severity: "medium", check: "vague-cta-text", title: `CTA text is vague: "${ctaText}"`, detail: "Generic text doesn't tell an agent what action this performs.", impact: "Agents need descriptive text to decide whether to click." });
    if (zone.isLink && el.getAttribute("onclick") && (!el.getAttribute("href") || el.getAttribute("href") === "#")) issues.push({ severity: "high", check: "onclick-cta", title: "CTA relies on onclick handler instead of a real URL", detail: `onclick="${(el.getAttribute("onclick") || "").slice(0,60)}"`, impact: "The action is in JavaScript, not a navigable href." });
  }

  // Cross-cutting checks
  if (el) {
    const modal = el.closest('[class*="modal"],[class*="dialog"],[role="dialog"],[class*="popup"],[class*="overlay"]');
    if (modal && ((modal.getAttribute("style") || "").includes("display: none") || (modal.getAttribute("style") || "").includes("visibility: hidden") || modal.getAttribute("aria-hidden") === "true")) issues.push({ severity: "high", check: "hidden-modal", title: "This action is inside a hidden modal/dialog", detail: "The form/CTA is inside a modal that's not visible by default.", impact: "The agent needs to find and click a trigger to open this modal first." });
    if (el.getAttribute("aria-hidden") === "true" || el.closest('[aria-hidden="true"]')) issues.push({ severity: "high", check: "aria-hidden-action", title: "This action element has aria-hidden='true'", detail: "The element or a parent is hidden from assistive technology.", impact: "AI agents using the accessibility tree will not see this element." });
  }

  const highCount = issues.filter(i => i.severity === "high").length;
  const medCount = issues.filter(i => i.severity === "medium").length;
  return { zone, issues, score: highCount > 0 ? "poor" : medCount > 0 ? "partial" : "good" };
}

function runAgentReadinessAudit(confirmedZones, doc) { return confirmedZones.map(zone => auditActionZone(zone, doc)); }

function checkGlobalAgentSignals(doc, html) {
  const signals = [];
  const hasSchemaActions = /potentialAction/i.test(html);
  signals.push({ check: "schema-actions", present: hasSchemaActions, label: "Schema.org potentialAction markup", detail: hasSchemaActions ? "Page declares structured actions \u2014 agents can discover interactions via schema" : "No potentialAction in schema \u2014 agents must infer actions from the UI" });
  const hasMain = doc.querySelector("main") || doc.querySelector('[role="main"]');
  signals.push({ check: "main-landmark", present: !!hasMain, label: "<main> landmark element", detail: hasMain ? "Page has a main content area \u2014 helps agents focus on primary content" : "No <main> element \u2014 agents may struggle to distinguish primary content from nav/footer" });
  const hasNav = doc.querySelector("nav") || doc.querySelector('[role="navigation"]');
  signals.push({ check: "nav-landmark", present: !!hasNav, label: "Navigation landmark (<nav>)", detail: hasNav ? "Navigation is properly landmarked" : "No <nav> elements found" });
  const h1s = doc.querySelectorAll("h1");
  signals.push({ check: "h1-present", present: h1s.length === 1, label: "Single H1 heading", detail: h1s.length === 0 ? "No H1 \u2014 agents can't identify the page's primary topic" : h1s.length === 1 ? "Single H1 present \u2014 clear page topic" : `${h1s.length} H1s \u2014 may confuse agents about the page's purpose` });
  const hasLlmsTxt = /llms\.txt|llms-full\.txt/i.test(html);
  signals.push({ check: "llms-txt", present: hasLlmsTxt, label: "llms.txt reference", detail: hasLlmsTxt ? "Page references llms.txt \u2014 provides structured instructions for LLMs" : "No llms.txt reference (optional, emerging standard)" });
  return signals;
}

/* ═══════════════════════════════════════════════════════════════════
   FULL ANALYSIS PIPELINE
   ═══════════════════════════════════════════════════════════════════ */
function analyze(sourceHtml, renderedHtml) {
  const sourceDoc = parseDoc(sourceHtml);
  const sourceData = {
    meta: extractMeta(sourceDoc), schema: extractSchema(sourceDoc),
    headings: extractHeadings(sourceDoc), links: extractLinks(sourceDoc),
    images: extractImages(sourceDoc), text: extractText(sourceDoc),
    dataAttrs: extractDataAttrs(sourceDoc),
  };
  const issues = auditSource(sourceDoc, sourceHtml);
  let renderedData = null, diff = null;
  if (renderedHtml?.trim().length > 100) {
    const renderedDoc = parseDoc(renderedHtml);
    renderedData = {
      meta: extractMeta(renderedDoc), schema: extractSchema(renderedDoc),
      headings: extractHeadings(renderedDoc), links: extractLinks(renderedDoc),
      images: extractImages(renderedDoc), text: extractText(renderedDoc),
      dataAttrs: extractDataAttrs(renderedDoc),
    };
    diff = computeDiff(sourceData, renderedData);
    issues.push(...promoteDiffToIssues(diff));
  }
  return { sourceData, renderedData, issues, diff };
}
