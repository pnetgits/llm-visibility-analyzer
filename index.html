/* ═══════════════════════════════════════════════════════════════════
   COPY REPORT
   ═══════════════════════════════════════════════════════════════════ */
function generateReport(r, crawlResults) {
  const lines = [];
  lines.push("LLM VISIBILITY REPORT");
  lines.push("=".repeat(50));
  lines.push("");

  if (r) {
    const hc = r.issues.filter(i => i.severity === "high").length;
    const mc = r.issues.filter(i => i.severity === "medium").length;
    const lc = r.issues.filter(i => i.severity === "low").length;
    lines.push("PAGE ANALYSIS SUMMARY");
    lines.push(`  High issues: ${hc}`);
    lines.push(`  Medium issues: ${mc}`);
    lines.push(`  Low issues: ${lc}`);
    lines.push(`  Crawlable links: ${r.sourceData.links.length}`);
    lines.push(`  Schema blocks: ${r.sourceData.schema.length}`);
    lines.push(`  Headings: ${r.sourceData.headings.length}`);
    lines.push("");
    if (r.issues.length > 0) {
      lines.push("ISSUES");
      lines.push("-".repeat(50));
      for (const issue of r.issues) {
        lines.push(`[${issue.severity.toUpperCase()}] ${issue.title}${issue.count > 1 ? ` (\u00D7${issue.count})` : ""}`);
        lines.push(`  ${issue.detail.split("\n")[0]}`);
        lines.push(`  Why: ${issue.why}`);
        lines.push("");
      }
    }
  }

  if (crawlResults) {
    lines.push("");
    lines.push("CRAWL TEST RESULTS");
    lines.push("=".repeat(50));
    lines.push(`URL: ${crawlResults.url}`);
    lines.push(`Tested: ${crawlResults.testedAt}`);
    lines.push("");
    const baseline = crawlResults.results.find(r => r.isBaseline);
    if (baseline) lines.push(`Baseline (Chrome): ${baseline.status} ${baseline.statusText}`);
    lines.push("");
    for (const cr of crawlResults.results.filter(cr => !cr.isBaseline)) {
      const icon = cr.blocked ? "BLOCKED" : cr.status === 200 ? "OK" : cr.status === 0 ? "ERROR" : `${cr.status}`;
      lines.push(`[${icon}] ${cr.name} (${cr.org}) \u2014 HTTP ${cr.status} ${cr.statusText || ""} \u2014 ${cr.responseTimeMs}ms`);
      if (cr.redirectedTo) lines.push(`  Redirected to: ${cr.redirectedTo}`);
      if (cr.robotsTxt === "disallowed") lines.push(`  Robots.txt: BLOCKED (matched: ${cr.robotsTxtMatchedAgent})`);
      if (cr.robotsTxt === "allowed" && cr.robotsTxtMatchedAgent && cr.robotsTxtMatchedAgent !== "none") lines.push(`  Robots.txt: Allowed (matched: ${cr.robotsTxtMatchedAgent})`);
      if (cr.robotsMeta) lines.push(`  Meta robots: ${cr.robotsMeta}`);
      if (cr.specificRobotsMeta) lines.push(`  Bot-specific meta: ${cr.specificRobotsMeta}`);
      if (cr.error) lines.push(`  Error: ${cr.error}`);
    }
  }

  return lines.join("\n");
}

/* ═══════════════════════════════════════════════════════════════════
   CRAWL TEST COMPONENT
   ═══════════════════════════════════════════════════════════════════ */
const WORKER_URL_KEY = "llm-analyzer-worker-url";
const DEFAULT_WORKER_URL = "https://llm-crawl-tester.google-cb4.workers.dev";

function CrawlTest({ onResults }) {
  const [workerUrl, setWorkerUrl] = useState(() => {
    try { return localStorage.getItem(WORKER_URL_KEY) || DEFAULT_WORKER_URL; } catch { return DEFAULT_WORKER_URL; }
  });
  const [testUrl, setTestUrl] = useState("");
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [error, setError] = useState("");
  const [showSetup, setShowSetup] = useState(false);
  const [copyMsg, setCopyMsg] = useState("");

  const saveWorkerUrl = useCallback((url) => {
    setWorkerUrl(url);
    try { localStorage.setItem(WORKER_URL_KEY, url); } catch {}
  }, []);

  const runTest = useCallback(async () => {
    if (!testUrl.trim() || !workerUrl.trim()) return;
    setLoading(true);
    setError("");
    setResults(null);

    let url = testUrl.trim();
    if (!url.startsWith("http://") && !url.startsWith("https://")) url = "https://" + url;

    try {
      const resp = await fetch(workerUrl.replace(/\/$/, "") + "/test", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        throw new Error(errData.error || `Worker returned HTTP ${resp.status}`);
      }
      const data = await resp.json();
      setResults(data);
      if (onResults) onResults(data);
    } catch (err) {
      if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
        setError("Can't reach the worker. Check the URL is correct and the worker is deployed.");
      } else {
        setError(err.message);
      }
    } finally {
      setLoading(false);
    }
  }, [testUrl, workerUrl, onResults]);

  const copyCrawlReport = useCallback(() => {
    if (!results) return;
    const text = generateReport(null, results);
    navigator.clipboard.writeText(text).then(() => {
      setCopyMsg("Copied!");
      setTimeout(() => setCopyMsg(""), 2000);
    });
  }, [results]);

  const statusColor = (r) => {
    if (r.blocked) return "var(--red)";
    if (r.status === 200) return "var(--green)";
    if (r.status >= 300 && r.status < 400) return "var(--orange)";
    if (r.status === 0) return "var(--dim)";
    return "var(--red)";
  };

  const statusIcon = (r) => {
    if (r.blocked) return "\u2717";
    if (r.status === 200) return "\u2713";
    if (r.status >= 300 && r.status < 400) return "\u21B7";
    if (r.status === 0) return "?";
    return "\u2717";
  };

  const hasWorker = workerUrl.trim().length > 0;

  return (
    <div>
      {/* Worker URL setup — shown when no URL saved */}
      {!hasWorker && !showSetup && (
        <div className="fade-in" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "28px 32px", marginBottom: 24, borderLeft: "3px solid var(--cyan)" }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 8, color: "var(--cyan)" }}>Setup Required</h3>
          <p style={{ color: "var(--muted)", fontSize: 13, lineHeight: 1.7, marginBottom: 16 }}>
            The crawl test needs a small proxy service to send requests with different user agents. This is a free Cloudflare Worker that takes about 5 minutes to set up.
          </p>
          <button onClick={() => setShowSetup(true)} style={{
            background: "var(--cyan)", color: "var(--bg)", border: "none", borderRadius: 8,
            padding: "10px 24px", fontSize: 13, fontWeight: 700, fontFamily: "var(--font-body)", cursor: "pointer",
          }}>Show Setup Guide</button>
        </div>
      )}

      {/* Setup guide */}
      {showSetup && (
        <div className="fade-in" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "28px 32px", marginBottom: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "var(--cyan)" }}>Cloudflare Worker Setup</h3>
            {hasWorker && <button onClick={() => setShowSetup(false)} style={{ background: "none", border: "none", color: "var(--muted)", fontSize: 18, cursor: "pointer" }}>{"\u00D7"}</button>}
          </div>
          <div style={{ fontSize: 13, color: "var(--muted)", lineHeight: 1.9 }}>
            <p style={{ marginBottom: 12 }}><strong style={{ color: "var(--text)" }}>1.</strong> Go to <a href="https://dash.cloudflare.com" target="_blank" rel="noopener" style={{ color: "var(--cyan)" }}>dash.cloudflare.com</a> and create a free account (or log in)</p>
            <p style={{ marginBottom: 12 }}><strong style={{ color: "var(--text)" }}>2.</strong> Click <strong style={{ color: "var(--text)" }}>Workers & Pages</strong> in the left sidebar, then <strong style={{ color: "var(--text)" }}>Create</strong></p>
            <p style={{ marginBottom: 12 }}><strong style={{ color: "var(--text)" }}>3.</strong> Choose <strong style={{ color: "var(--text)" }}>Create Worker</strong>, name it <code style={{ background: "var(--surface2)", padding: "2px 8px", borderRadius: 4, fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--cyan)" }}>llm-crawl-tester</code>, click <strong style={{ color: "var(--text)" }}>Deploy</strong></p>
            <p style={{ marginBottom: 12 }}><strong style={{ color: "var(--text)" }}>4.</strong> Click <strong style={{ color: "var(--text)" }}>Edit Code</strong>, delete everything in the editor, and paste the worker code from the <code style={{ background: "var(--surface2)", padding: "2px 8px", borderRadius: 4, fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--cyan)" }}>worker.js</code> file</p>
            <p style={{ marginBottom: 12 }}><strong style={{ color: "var(--text)" }}>5.</strong> Click <strong style={{ color: "var(--text)" }}>Deploy</strong> again</p>
            <p style={{ marginBottom: 16 }}><strong style={{ color: "var(--text)" }}>6.</strong> Copy the worker URL (looks like <code style={{ background: "var(--surface2)", padding: "2px 8px", borderRadius: 4, fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--cyan)" }}>https://llm-crawl-tester.yourname.workers.dev</code>) and paste it below:</p>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <input
              type="url" value={workerUrl} onChange={e => saveWorkerUrl(e.target.value)}
              placeholder="https://llm-crawl-tester.yourname.workers.dev"
              style={{
                flex: 1, padding: "10px 14px", background: "var(--surface2)", border: "1px solid var(--border)",
                borderRadius: 8, color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: 12, outline: "none",
              }}
              onFocus={e => e.target.style.borderColor = "var(--cyan)"}
              onBlur={e => e.target.style.borderColor = "var(--border)"}
            />
            {hasWorker && <button onClick={() => setShowSetup(false)} style={{
              background: "var(--cyan)", color: "var(--bg)", border: "none", borderRadius: 8,
              padding: "10px 20px", fontSize: 13, fontWeight: 700, fontFamily: "var(--font-body)", cursor: "pointer",
            }}>Done</button>}
          </div>
        </div>
      )}

      {/* URL input + test button */}
      {hasWorker && !showSetup && (
        <div className="fade-in">
          <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 8 }}>
            <input
              type="url" value={testUrl} onChange={e => setTestUrl(e.target.value)}
              placeholder="Enter a URL to test (e.g. https://example.com/page)"
              onKeyDown={e => e.key === "Enter" && runTest()}
              style={{
                flex: 1, padding: "12px 16px", background: "var(--surface)", border: "1px solid var(--border)",
                borderRadius: 10, color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: 13, outline: "none",
              }}
              onFocus={e => e.target.style.borderColor = "var(--cyan)"}
              onBlur={e => e.target.style.borderColor = "var(--border)"}
            />
            <button onClick={runTest} disabled={loading || !testUrl.trim()} style={{
              background: (!loading && testUrl.trim()) ? "var(--cyan)" : "var(--dim)",
              color: "var(--bg)", border: "none", borderRadius: 10, padding: "12px 28px",
              fontSize: 14, fontWeight: 700, fontFamily: "var(--font-body)",
              cursor: (!loading && testUrl.trim()) ? "pointer" : "default", whiteSpace: "nowrap",
            }}>{loading ? "Testing\u2026" : "Test Crawlers"}</button>
          </div>
          <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20 }}>
            <button onClick={() => setShowSetup(true)} style={{
              background: "none", border: "none", color: "var(--dim)", fontSize: 11, cursor: "pointer",
              fontFamily: "var(--font-body)", padding: "2px 0",
            }}>Change worker URL</button>
            {results && (
              <button onClick={copyCrawlReport} style={{
                background: "none", border: "1px solid var(--border)", borderRadius: 8,
                color: copyMsg ? "var(--green)" : "var(--muted)", fontSize: 12, cursor: "pointer",
                fontFamily: "var(--font-body)", padding: "4px 14px", fontWeight: 600,
              }}>{copyMsg || "Copy Results"}</button>
            )}
          </div>
        </div>
      )}

      {/* Loading */}
      {loading && (
        <div className="fade-in" style={{ padding: "40px 20px", textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 28, height: 28, border: "3px solid var(--border)", borderTopColor: "var(--cyan)", borderRadius: "50%", animation: "spin 0.8s linear infinite", marginBottom: 12 }} />
          <p style={{ color: "var(--muted)", fontSize: 13 }}>Testing with 16 crawlers {"\u00D7"} 3 passes (with delays between each){"\u2026"}</p>
          <p style={{ color: "var(--dim)", fontSize: 11, marginTop: 6 }}>This takes about 10 seconds to check for intermittent blocking</p>
        </div>
      )}

      {/* Error */}
      {error && (
        <div className="fade-in" style={{ background: "var(--red-bg)", border: "1px solid var(--red)", borderRadius: 10, padding: "14px 18px", marginBottom: 20 }}>
          <strong style={{ color: "var(--red)" }}>Error:</strong>
          <span style={{ color: "var(--muted)", marginLeft: 8, fontSize: 13 }}>{error}</span>
        </div>
      )}

      {/* Results */}
      {results && !loading && (
        <div className="fade-in">
          {(() => {
            const baseline = results.results.find(r => r.isBaseline);
            const bots = results.results.filter(r => !r.isBaseline);
            const blocked = bots.filter(r => r.blocked);
            const ok = bots.filter(r => r.status === 200);
            const redirected = bots.filter(r => r.status >= 300 && r.status < 400);
            const errored = bots.filter(r => r.status === 0);
            const other = bots.filter(r => !r.blocked && r.status !== 200 && !(r.status >= 300 && r.status < 400) && r.status !== 0);
            const intermittent = bots.filter(r => r.passes && r.passes.length > 1 && !r.consistent);
            const robotsBlocked = bots.filter(r => r.robotsTxt === "disallowed");

            return (
              <>
                {/* Summary cards */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 12, marginBottom: 24 }}>
                  {[
                    { n: ok.length, label: "HTTP Allowed", color: ok.length > 0 ? "var(--green)" : "var(--dim)" },
                    { n: blocked.length, label: "HTTP Blocked", color: blocked.length > 0 ? "var(--red)" : "var(--green)" },
                    { n: robotsBlocked.length, label: "Robots.txt Blocked", color: robotsBlocked.length > 0 ? "var(--red)" : "var(--green)" },
                    { n: intermittent.length, label: "Intermittent", color: intermittent.length > 0 ? "var(--orange)" : "var(--dim)" },
                  ].map((card, i) => (
                    <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", borderLeft: `3px solid ${card.color}` }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: card.color, fontFamily: "var(--font-mono)" }}>{card.n}</div>
                      <div style={{ fontSize: 10, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 3, fontWeight: 600 }}>{card.label}</div>
                    </div>
                  ))}
                </div>

                {/* Baseline */}
                {baseline && (
                  <div style={{ background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
                    <span style={{ fontSize: 18, color: statusColor(baseline) }}>{statusIcon(baseline)}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 13 }}>Baseline: Chrome Browser</div>
                      <div style={{ fontSize: 12, color: "var(--dim)" }}>Standard browser request {"\u2014"} this is what we compare all bots against</div>
                    </div>
                    <Badge color={statusColor(baseline)}>HTTP {baseline.status}</Badge>
                    <span style={{ fontSize: 11, color: "var(--dim)", fontFamily: "var(--font-mono)" }}>{baseline.responseTimeMs}ms</span>
                  </div>
                )}

                {/* Bot results */}
                <Section title="Crawler Results" count={bots.length} defaultOpen tagText={blocked.length > 0 ? `${blocked.length} blocked` : "all clear"} tagColor={blocked.length > 0 ? "var(--red)" : "var(--green)"}>
                  {bots.map((cr, i) => {
                    const hasPasses = cr.passes && cr.passes.length > 1;
                    const inconsistent = hasPasses && !cr.consistent;
                    return (
                    <div key={i} style={{
                      display: "grid", gridTemplateColumns: "32px 1fr auto auto",
                      gap: 14, padding: "12px 18px", alignItems: "center",
                      borderBottom: "1px solid var(--border)",
                      background: inconsistent ? "var(--orange-bg)" : cr.blocked ? "var(--red-bg)" : "transparent",
                    }}>
                      <span style={{ fontSize: 18, color: statusColor(cr), textAlign: "center" }}>{statusIcon(cr)}</span>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
                          {cr.name}
                          <span style={{ fontSize: 11, color: "var(--dim)", fontWeight: 400 }}>{cr.org}</span>
                          {inconsistent && <Badge color="var(--orange)">intermittent</Badge>}
                        </div>
                        <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 2 }}>{cr.description}</div>
                        {/* Per-pass status dots */}
                        {hasPasses && (
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 5 }}>
                            <span style={{ fontSize: 10, color: "var(--dim)" }}>Passes:</span>
                            {cr.passes.map((p, pi) => (
                              <span key={pi} title={`Pass ${pi+1}: HTTP ${p.status} (${p.responseTimeMs}ms)`} style={{
                                display: "inline-flex", alignItems: "center", gap: 3,
                                fontSize: 10, fontFamily: "var(--font-mono)",
                                color: p.blocked ? "var(--red)" : p.status === 200 ? "var(--green)" : p.status >= 300 && p.status < 400 ? "var(--orange)" : "var(--dim)",
                              }}>
                                <span style={{
                                  width: 7, height: 7, borderRadius: "50%", display: "inline-block",
                                  background: p.blocked ? "var(--red)" : p.status === 200 ? "var(--green)" : p.status >= 300 && p.status < 400 ? "var(--orange)" : "var(--dim)",
                                }} />
                                {p.status || "ERR"}
                              </span>
                            ))}
                            {inconsistent && <span style={{ fontSize: 10, color: "var(--orange)", marginLeft: 4 }}>{"\u26A0"} inconsistent responses</span>}
                          </div>
                        )}
                        {cr.redirectedTo && <div style={{ fontSize: 11, color: "var(--orange)", marginTop: 3, fontFamily: "var(--font-mono)" }}>{"\u21B7"} Redirected to: {trunc(cr.redirectedTo, 60)}</div>}
                        {cr.robotsTxt === "disallowed" && (
                          <div style={{ fontSize: 11, color: "var(--red)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{"\u2717"}</span> Blocked by robots.txt <span style={{ color: "var(--dim)" }}>(matched: {cr.robotsTxtMatchedAgent})</span>
                          </div>
                        )}
                        {cr.robotsTxt === "allowed" && (
                          <div style={{ fontSize: 11, color: "var(--green)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{"\u2713"}</span> Allowed by robots.txt {cr.robotsTxtMatchedAgent && cr.robotsTxtMatchedAgent !== "none" && cr.robotsTxtMatchedAgent !== "*" && <span style={{ color: "var(--dim)" }}>(matched: {cr.robotsTxtMatchedAgent})</span>}
                          </div>
                        )}
                        {cr.robotsTxt === null && !cr.isBaseline && (
                          <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            {"\u2014"} No robots.txt found
                          </div>
                        )}
                        {cr.robotsMeta && /noindex|nofollow|none/i.test(cr.robotsMeta) && (
                          <div style={{ fontSize: 11, color: "var(--orange)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{"\u26A0"}</span> Meta robots: {cr.robotsMeta}
                          </div>
                        )}
                        {cr.robotsMeta && !/noindex|nofollow|none/i.test(cr.robotsMeta) && (
                          <div style={{ fontSize: 11, color: "var(--green)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{"\u2713"}</span> Meta robots: {cr.robotsMeta}
                          </div>
                        )}
                        {!cr.robotsMeta && !cr.isBaseline && cr.status === 200 && (
                          <div style={{ fontSize: 11, color: "var(--green)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{"\u2713"}</span> No restrictive meta robots tags
                          </div>
                        )}
                        {cr.specificRobotsMeta && (
                          <div style={{ fontSize: 11, color: /noindex|nofollow|none/i.test(cr.specificRobotsMeta) ? "var(--red)" : "var(--purple)", marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{/noindex|nofollow|none/i.test(cr.specificRobotsMeta) ? "\u2717" : "\u2713"}</span> Bot-specific meta: {cr.specificRobotsMeta}
                          </div>
                        )}
                        {cr.error && <div style={{ fontSize: 11, color: "var(--red)", marginTop: 3 }}>{cr.timeout ? "Request timed out (15s)" : cr.error}</div>}
                      </div>
                      <Badge color={statusColor(cr)}>HTTP {cr.status || "ERR"}</Badge>
                      <span style={{ fontSize: 11, color: "var(--dim)", fontFamily: "var(--font-mono)", minWidth: 48, textAlign: "right" }}>{cr.responseTimeMs}ms</span>
                    </div>
                    );
                  })}
                </Section>

                {/* Interpretation */}
                {blocked.length > 0 && (
                  <div style={{ background: "var(--red-bg)", border: "1px solid rgba(248,113,113,0.2)", borderRadius: 10, padding: "16px 20px", marginTop: 16, borderLeft: "3px solid var(--red)" }}>
                    <div style={{ fontWeight: 700, color: "var(--red)", marginBottom: 6, fontSize: 13 }}>
                      {blocked.length} crawler{blocked.length > 1 ? "s" : ""} blocked
                    </div>
                    <div style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.7 }}>
                      These bots received a 403 (Forbidden) response: <strong style={{ color: "var(--text)" }}>{blocked.map(b => b.name).join(", ")}</strong>. This means these AI systems cannot access this page at all. This is typically caused by the server's WAF or CDN blocking known bot user agents, or by rules in the site's web server configuration.
                    </div>
                  </div>
                )}
                {intermittent.length > 0 && (
                  <div style={{ background: "var(--orange-bg)", border: "1px solid rgba(251,191,36,0.2)", borderRadius: 10, padding: "16px 20px", marginTop: 16, borderLeft: "3px solid var(--orange)" }}>
                    <div style={{ fontWeight: 700, color: "var(--orange)", marginBottom: 6, fontSize: 13 }}>
                      {intermittent.length} crawler{intermittent.length > 1 ? "s" : ""} with intermittent responses
                    </div>
                    <div style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.7 }}>
                      <strong style={{ color: "var(--text)" }}>{intermittent.map(b => b.name).join(", ")}</strong> received different status codes across 3 passes. This usually means the server's WAF or CDN is applying rate limiting, challenge-based blocking, or probabilistic bot detection. These crawlers may sometimes be able to access the page and sometimes not {"\u2014"} which means LLM visibility is unreliable.
                    </div>
                  </div>
                )}
                {robotsBlocked.length > 0 && (
                  <div style={{ background: "var(--red-bg)", border: "1px solid rgba(248,113,113,0.2)", borderRadius: 10, padding: "16px 20px", marginTop: 16, borderLeft: "3px solid var(--red)" }}>
                    <div style={{ fontWeight: 700, color: "var(--red)", marginBottom: 6, fontSize: 13 }}>
                      {robotsBlocked.length} crawler{robotsBlocked.length > 1 ? "s" : ""} blocked by robots.txt
                    </div>
                    <div style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.7 }}>
                      The site's robots.txt file disallows access for: <strong style={{ color: "var(--text)" }}>{robotsBlocked.map(b => b.name).join(", ")}</strong>. Well-behaved crawlers will respect this and not index the page. Note that robots.txt is a voluntary standard {"\u2014"} it tells bots they shouldn't access the page, but doesn't technically prevent it. Some bots may still crawl despite being disallowed.
                    </div>
                  </div>
                )}
                {blocked.length === 0 && intermittent.length === 0 && robotsBlocked.length === 0 && ok.length === bots.length && (
                  <div style={{ background: "var(--green-bg)", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 10, padding: "16px 20px", marginTop: 16, borderLeft: "3px solid var(--green)" }}>
                    <div style={{ fontWeight: 700, color: "var(--green)", marginBottom: 4, fontSize: 13 }}>All crawlers allowed consistently</div>
                    <div style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.7 }}>
                      All tested LLM crawlers received a 200 response across all 3 passes, and none are blocked by robots.txt or meta robots tags.
                    </div>
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   AGENT READINESS COMPONENT
   ═══════════════════════════════════════════════════════════════════ */
const categoryMeta = { "search": { icon: "\uD83D\uDD0D", color: "var(--accent)" }, "newsletter": { icon: "\uD83D\uDCE7", color: "var(--purple)" }, "contact": { icon: "\uD83D\uDCAC", color: "var(--accent)" }, "booking": { icon: "\uD83D\uDCC5", color: "var(--cyan)" }, "appointment": { icon: "\uD83D\uDCC5", color: "var(--cyan)" }, "checkout": { icon: "\uD83D\uDCB3", color: "var(--green)" }, "add-to-cart": { icon: "\uD83D\uDED2", color: "var(--green)" }, "login": { icon: "\uD83D\uDD10", color: "var(--muted)" }, "registration": { icon: "\uD83D\uDCDD", color: "var(--muted)" }, "download": { icon: "\uD83D\uDCE5", color: "var(--purple)" }, "chat": { icon: "\uD83D\uDCAC", color: "var(--accent)" }, "captcha": { icon: "\uD83D\uDEE1\uFE0F", color: "var(--red)" }, "bot-detection": { icon: "\uD83D\uDEE1\uFE0F", color: "var(--red)" }, "consent": { icon: "\uD83C\uDF6A", color: "var(--orange)" }, "schema": { icon: "\uD83D\uDCCB", color: "var(--purple)" }, "user-defined": { icon: "\u270F\uFE0F", color: "var(--cyan)" }, "other-form": { icon: "\uD83D\uDCC4", color: "var(--muted)" }, "other-action": { icon: "\u26A1", color: "var(--muted)" } };
const getCatMeta = (cat) => categoryMeta[cat] || { icon: "\u2022", color: "var(--muted)" };
const scoreColors = { "good": "var(--green)", "partial": "var(--orange)", "poor": "var(--red)", "blocker": "var(--red)", "warning": "var(--orange)" };
const scoreLabels = { "good": "Agent Ready", "partial": "Partial Issues", "poor": "Not Agent Ready", "blocker": "Agent Blocker", "warning": "Warning" };

function AgentReadiness({ sourceDoc: externalDoc, sourceHtml }) {
  const [zones, setZones] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [userActions, setUserActions] = useState("");
  const [auditResults, setAuditResults] = useState(null);
  const [globalSignals, setGlobalSignals] = useState([]);
  const [phase, setPhase] = useState("select");
  const [internalDoc, setInternalDoc] = useState(null);

  const sourceDoc = externalDoc || internalDoc;

  useEffect(() => {
    if (externalDoc) { setInternalDoc(null); return; }
    if (sourceHtml && sourceHtml.trim().length > 50) setInternalDoc(parseDoc(sourceHtml));
    else setInternalDoc(null);
  }, [sourceHtml, externalDoc]);

  useEffect(() => {
    if (!sourceDoc) return;
    const detected = detectActionZones(sourceDoc, sourceHtml);
    setZones(detected);
    const autoSelect = new Set();
    detected.forEach(z => { if (z.confidence >= 0.7 && z.category !== "filter") autoSelect.add(z.id); });
    setSelected(autoSelect);
    setAuditResults(null);
    setPhase("select");
    setGlobalSignals(checkGlobalAgentSignals(sourceDoc, sourceHtml));
  }, [sourceDoc, sourceHtml]);

  const toggleZone = useCallback((id) => { setSelected(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; }); }, []);
  const selectAll = useCallback(() => { setSelected(new Set(zones.map(z => z.id))); }, [zones]);
  const selectNone = useCallback(() => { setSelected(new Set()); }, []);

  const runAudit = useCallback(() => {
    if (!sourceDoc) return;
    let confirmedZones = zones.filter(z => selected.has(z.id));
    if (userActions.trim()) {
      const extraZones = matchUserActions(userActions.split("\n").map(a => a.trim()).filter(a => a.length > 0), confirmedZones, sourceDoc);
      confirmedZones = [...confirmedZones, ...extraZones];
    }
    setAuditResults(runAgentReadinessAudit(confirmedZones, sourceDoc));
    setPhase("results");
  }, [zones, selected, userActions, sourceDoc]);

  if (!sourceDoc) return <div style={{ padding: "40px 20px", textAlign: "center", color: "var(--dim)" }}>Paste page source HTML in the Page Analysis tab first, then come here to check agent readiness.</div>;

  const actionZones = zones.filter(z => z.type !== "blocker");
  const blockers = zones.filter(z => z.type === "blocker");

  if (phase === "select") {
    return (
      <div className="fade-in">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 24 }}>
          {[{ n: actionZones.length, label: "Action Points", color: actionZones.length > 0 ? "var(--emerald)" : "var(--dim)" },{ n: blockers.length, label: "Blockers", color: blockers.length > 0 ? "var(--red)" : "var(--green)" },{ n: zones.filter(z => z.type === "schema-action").length, label: "Schema Actions", color: "var(--purple)" }].map((card, i) => (
            <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", borderLeft: `3px solid ${card.color}` }}>
              <div style={{ fontSize: 24, fontWeight: 700, color: card.color, fontFamily: "var(--font-mono)" }}>{card.n}</div>
              <div style={{ fontSize: 10, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 3, fontWeight: 600 }}>{card.label}</div>
            </div>
          ))}
        </div>

        {zones.length === 0 ? (
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "32px 24px", textAlign: "center" }}>
            <div style={{ fontSize: 28, marginBottom: 12 }}>{"\uD83E\uDD37"}</div>
            <div style={{ color: "var(--muted)", fontSize: 14, lineHeight: 1.6, maxWidth: 400, margin: "0 auto" }}>No action zones detected in the HTML source. This could mean the page is purely informational, or that all interactive elements are loaded via JavaScript.<br/><br/>Try adding actions manually below.</div>
          </div>
        ) : (
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>Detected Action Points <span style={{ fontSize: 12, color: "var(--dim)", fontWeight: 400, marginLeft: 8 }}>Tick the actions that matter for this page</span></div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={selectAll} style={{ background: "none", border: "1px solid var(--border)", borderRadius: 6, color: "var(--muted)", fontSize: 11, cursor: "pointer", padding: "4px 12px", fontFamily: "var(--font-body)" }}>Select all</button>
                <button onClick={selectNone} style={{ background: "none", border: "1px solid var(--border)", borderRadius: 6, color: "var(--muted)", fontSize: 11, cursor: "pointer", padding: "4px 12px", fontFamily: "var(--font-body)" }}>Clear</button>
              </div>
            </div>

            {blockers.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--red)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8, padding: "0 4px" }}>{"\u26A0"} Blockers Detected</div>
                {blockers.map(z => { const meta = getCatMeta(z.category); return (
                  <label key={z.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px", background: "var(--red-bg)", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", marginBottom: 6 }}>
                    <input type="checkbox" checked={selected.has(z.id)} onChange={() => toggleZone(z.id)} style={{ marginTop: 3, accentColor: "var(--red)" }} />
                    <div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}><span>{meta.icon}</span>{z.label}</div><div style={{ fontSize: 11, color: "var(--dim)", marginTop: 2 }}>{z.elementDesc}</div></div>
                    <Badge color="var(--red)">{z.category}</Badge>
                  </label>
                ); })}
              </div>
            )}

            {actionZones.map(z => { const meta = getCatMeta(z.category); return (
              <label key={z.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px", background: selected.has(z.id) ? "var(--emerald-dim)" : "var(--surface)", border: `1px solid ${selected.has(z.id) ? "var(--emerald)" + "40" : "var(--border)"}`, borderRadius: 8, cursor: "pointer", marginBottom: 6, transition: "all 0.15s" }}>
                <input type="checkbox" checked={selected.has(z.id)} onChange={() => toggleZone(z.id)} style={{ marginTop: 3, accentColor: "var(--emerald)" }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}><span>{meta.icon}</span>{z.label}{z.confidence < 0.7 && <span style={{ fontSize: 10, color: "var(--dim)", fontWeight: 400 }}>(low confidence)</span>}</div>
                  <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 2 }}>{z.elementDesc}</div>
                  {z.nearbyText && <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 1, fontStyle: "italic" }}>Context: {z.nearbyText.slice(0, 80)}</div>}
                </div>
                <Badge color={meta.color}>{z.category}</Badge>
              </label>
            ); })}
          </div>
        )}

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Additional Actions <span style={{ fontSize: 12, color: "var(--dim)", fontWeight: 400, marginLeft: 8 }}>Actions the scan missed? One per line.</span></div>
          <textarea value={userActions} onChange={e => setUserActions(e.target.value)} placeholder={"e.g.\nBook a villa\nSubscribe to newsletter\nDownload brochure"} rows={3}
            style={{ width: "100%", padding: "12px 14px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, color: "var(--text)", fontFamily: "var(--font-body)", fontSize: 13, resize: "vertical", outline: "none", lineHeight: 1.6 }}
            onFocus={e => e.target.style.borderColor = "var(--emerald)"} onBlur={e => e.target.style.borderColor = "var(--border)"} />
        </div>

        {globalSignals.length > 0 && (
          <Section title="Page-Level Agent Signals" count={globalSignals.length} defaultOpen={false}>
            {globalSignals.map((sig, i) => <Row key={i} cols="24px 1fr"><span style={{ color: sig.present ? "var(--green)" : "var(--dim)", fontSize: 14, textAlign: "center" }}>{sig.present ? "\u2713" : "\u2014"}</span><div><div style={{ fontSize: 13, fontWeight: 600, color: sig.present ? "var(--text)" : "var(--muted)" }}>{sig.label}</div><div style={{ fontSize: 11, color: "var(--dim)", marginTop: 1 }}>{sig.detail}</div></div></Row>)}
          </Section>
        )}

        <button onClick={runAudit} disabled={selected.size === 0 && !userActions.trim()} style={{
          width: "100%", padding: "14px 24px", background: (selected.size > 0 || userActions.trim()) ? "var(--emerald)" : "var(--dim)",
          color: "var(--bg)", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, fontFamily: "var(--font-body)", cursor: (selected.size > 0 || userActions.trim()) ? "pointer" : "default", marginTop: 8,
        }}>Audit {selected.size} Action{selected.size !== 1 ? "s" : ""}{userActions.trim() ? ` + ${userActions.split("\n").filter(a => a.trim()).length} custom` : ""} for Agent Readiness</button>
      </div>
    );
  }

  if (phase === "results" && auditResults) {
    const goodCount = auditResults.filter(r => r.score === "good").length;
    const partialCount = auditResults.filter(r => r.score === "partial" || r.score === "warning").length;
    const poorCount = auditResults.filter(r => r.score === "poor" || r.score === "blocker").length;
    const totalIssues = auditResults.reduce((sum, r) => sum + r.issues.length, 0);

    return (
      <div className="fade-in">
        <button onClick={() => { setPhase("select"); setAuditResults(null); }} style={{ background: "none", border: "1px solid var(--border)", borderRadius: 8, color: "var(--muted)", fontSize: 12, cursor: "pointer", padding: "6px 16px", fontFamily: "var(--font-body)", marginBottom: 16, fontWeight: 600 }}>{"\u2190"} Back to selection</button>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 12, marginBottom: 24 }}>
          {[{ n: goodCount, label: "Agent Ready", color: goodCount > 0 ? "var(--green)" : "var(--dim)" },{ n: partialCount, label: "Partial Issues", color: partialCount > 0 ? "var(--orange)" : "var(--dim)" },{ n: poorCount, label: "Not Ready / Blocked", color: poorCount > 0 ? "var(--red)" : "var(--green)" },{ n: totalIssues, label: "Total Issues", color: totalIssues > 0 ? "var(--orange)" : "var(--green)" }].map((card, i) => (
            <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", borderLeft: `3px solid ${card.color}` }}>
              <div style={{ fontSize: 24, fontWeight: 700, color: card.color, fontFamily: "var(--font-mono)" }}>{card.n}</div>
              <div style={{ fontSize: 10, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 3, fontWeight: 600 }}>{card.label}</div>
            </div>
          ))}
        </div>

        {auditResults.map((result, i) => { const { zone, issues, score } = result; const meta = getCatMeta(zone.category); const sColor = scoreColors[score] || "var(--muted)"; const sLabel = scoreLabels[score] || score; return (
          <div key={i} className="fade-in" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, marginBottom: 12, overflow: "hidden", borderLeft: `3px solid ${sColor}` }}>
            <div style={{ padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, borderBottom: issues.length > 0 ? "1px solid var(--border)" : "none" }}>
              <span style={{ fontSize: 20 }}>{meta.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{zone.label}</div>
                <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 2 }}>{zone.elementDesc}{zone.source === "user-defined" && <span style={{ color: "var(--cyan)", marginLeft: 8 }}>(user-defined)</span>}</div>
              </div>
              <Badge color={sColor}>{sLabel}</Badge>
            </div>
            {issues.length > 0 && <div>{issues.map((issue, j) => (
              <div key={j} style={{ padding: "12px 18px", borderBottom: j < issues.length - 1 ? "1px solid var(--border)" : "none", background: issue.severity === "high" ? "var(--red-bg)" : "transparent" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: sevColor(issue.severity) }} />
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{issue.title}</span>
                  <Badge color={sevColor(issue.severity)}>{issue.severity}</Badge>
                </div>
                <div style={{ fontSize: 12, color: "var(--muted)", marginLeft: 14, lineHeight: 1.6 }}>{issue.detail}</div>
                <div style={{ fontSize: 12, color: "var(--dim)", marginLeft: 14, marginTop: 4, padding: "9px 12px", background: "var(--surface2)", borderRadius: 6, borderLeft: "3px solid var(--orange)", lineHeight: 1.7 }}>
                  <strong style={{ color: "var(--orange)" }}>Impact:</strong> {issue.impact}
                </div>
              </div>
            ))}</div>}
            {issues.length === 0 && <div style={{ padding: "0 18px 14px", fontSize: 12, color: "var(--green)" }}>{"\u2713"} No agent readiness issues found for this action.</div>}
          </div>
        ); })}

        {globalSignals.length > 0 && (
          <Section title="Page-Level Agent Signals" count={globalSignals.length} defaultOpen={false}>
            {globalSignals.map((sig, i) => <Row key={i} cols="24px 1fr"><span style={{ color: sig.present ? "var(--green)" : "var(--dim)", fontSize: 14, textAlign: "center" }}>{sig.present ? "\u2713" : "\u2014"}</span><div><div style={{ fontSize: 13, fontWeight: 600, color: sig.present ? "var(--text)" : "var(--muted)" }}>{sig.label}</div><div style={{ fontSize: 11, color: "var(--dim)", marginTop: 1 }}>{sig.detail}</div></div></Row>)}
          </Section>
        )}
      </div>
    );
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════════ */
function App() {
  const [mode, setMode] = useState("analysis");
  const [sourceHtml, setSourceHtml] = useState("");
  const [renderedHtml, setRenderedHtml] = useState("");
  const [results, setResults] = useState(null);
  const [tab, setTab] = useState("audit");
  const [showHelp, setShowHelp] = useState(false);
  const [copyMsg, setCopyMsg] = useState("");
  const [crawlResults, setCrawlResults] = useState(null);
  const [sourceDoc, setSourceDoc] = useState(null);

  const run = useCallback(() => {
    if (!sourceHtml.trim()) return;
    setResults(analyze(sourceHtml, renderedHtml));
    setSourceDoc(parseDoc(sourceHtml));
    setTab("audit");
  }, [sourceHtml, renderedHtml]);

  const clear = useCallback(() => { setSourceHtml(""); setRenderedHtml(""); setResults(null); setSourceDoc(null); }, []);

  const copyReport = useCallback(() => {
    if (!results) return;
    const text = generateReport(results, crawlResults);
    navigator.clipboard.writeText(text).then(() => {
      setCopyMsg("Copied!");
      setTimeout(() => setCopyMsg(""), 2000);
    });
  }, [results, crawlResults]);

  const r = results;
  const highCount = r?.issues.filter(i => i.severity === "high").length || 0;
  const medCount = r?.issues.filter(i => i.severity === "medium").length || 0;
  const lowCount = r?.issues.filter(i => i.severity === "low").length || 0;
  const totalIssues = highCount + medCount + lowCount;
  const hasDiff = !!r?.diff;
  const diffTotal = hasDiff ? (r.diff.text.length + r.diff.links.length + r.diff.headings.length + r.diff.schema.length + r.diff.images.length) : 0;

  return (
    <div>
      {showHelp && <HelpGuide onClose={() => setShowHelp(false)} />}

      {/* HEADER */}
      <div style={{ borderBottom: "1px solid var(--border)", padding: "20px 28px", background: "var(--surface)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: "-0.03em", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: "var(--accent)", fontSize: 24 }}>{"\u25C8"}</span>
              LLM Visibility Analyzer
            </h1>
            <p style={{ fontSize: 13, color: "var(--muted)", marginTop: 4, marginBottom: 0 }}>
              See what AI systems can extract from your pages, whether they can access them, and whether agents can take actions.
            </p>
          </div>
          <button onClick={() => setShowHelp(true)} style={{
            background: "var(--surface2)", color: "var(--accent)", border: "1px solid var(--border)",
            borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600,
            fontFamily: "var(--font-body)", cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
          }}>
            <span style={{ fontSize: 16 }}>?</span> How to use
          </button>
        </div>
      </div>

      {/* MODE SWITCHER */}
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "20px 24px 0" }}>
        <div style={{ display: "flex", gap: 4, background: "var(--surface)", borderRadius: 10, padding: 4, border: "1px solid var(--border)", width: "fit-content", marginBottom: 24 }}>
          {[
            { id: "analysis", label: "Page Analysis", icon: "\uD83D\uDD0D" },
            { id: "agent", label: "Agent Readiness", icon: "\uD83E\uDD16" },
            { id: "crawl", label: "Crawl Test", icon: "\uD83D\uDD17" },
          ].map(m => (
            <button key={m.id} onClick={() => setMode(m.id)} style={{
              padding: "9px 20px", fontSize: 13, fontWeight: 600, fontFamily: "var(--font-body)",
              color: mode === m.id ? "var(--text)" : "var(--dim)",
              background: mode === m.id ? "var(--surface2)" : "transparent",
              border: mode === m.id ? "1px solid var(--border)" : "1px solid transparent",
              borderRadius: 7, cursor: "pointer", transition: "all 0.15s",
              display: "flex", alignItems: "center", gap: 6,
            }}>
              <span style={{ fontSize: 14 }}>{m.icon}</span>
              {m.label}
            </button>
          ))}
        </div>

        {/* ═══ MODE: PAGE ANALYSIS ═══ */}
        {mode === "analysis" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 18 }}>
              <div style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>
                  Source HTML <span style={{ color: "var(--red)" }}>*</span>
                </div>
                <div style={{ fontSize: 12, color: "var(--dim)", marginBottom: 10, lineHeight: 1.7 }}>
                  Right-click page {"\u2192"} <strong style={{ color: "var(--muted)" }}>View Page Source</strong> (Ctrl+U / Cmd+U). Copy everything.
                </div>
                <textarea value={sourceHtml} onChange={e => setSourceHtml(e.target.value)}
                  placeholder="Paste full View Page Source HTML here..." spellCheck={false}
                  style={{ flex: 1, minHeight: 160, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: 12, padding: 16, resize: "vertical", outline: "none" }}
                  onFocus={e => e.target.style.borderColor = "var(--accent)"} onBlur={e => e.target.style.borderColor = "var(--border)"} />
              </div>
              <div style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--purple)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>
                  Rendered DOM <span style={{ color: "var(--dim)", fontWeight: 400, textTransform: "none", letterSpacing: "normal", fontSize: 12 }}>(optional)</span>
                </div>
                <div style={{ fontSize: 12, color: "var(--dim)", marginBottom: 10, lineHeight: 1.7 }}>
                  DevTools (F12) {"\u2192"} <strong style={{ color: "var(--muted)" }}>Elements</strong> {"\u2192"} right-click <code style={{ background: "var(--surface2)", padding: "1px 6px", borderRadius: 3, color: "var(--purple)", fontSize: 11, fontFamily: "var(--font-mono)" }}>&lt;html&gt;</code> {"\u2192"} Copy outerHTML.
                </div>
                <textarea value={renderedHtml} onChange={e => setRenderedHtml(e.target.value)}
                  placeholder="Paste rendered DOM HTML here (optional)..." spellCheck={false}
                  style={{ flex: 1, minHeight: 160, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: 12, padding: 16, resize: "vertical", outline: "none" }}
                  onFocus={e => e.target.style.borderColor = "var(--purple)"} onBlur={e => e.target.style.borderColor = "var(--border)"} />
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
              <button onClick={run} disabled={!sourceHtml.trim()} style={{
                background: sourceHtml.trim() ? "var(--accent)" : "var(--dim)", color: "var(--bg)", border: "none",
                borderRadius: 10, padding: "11px 36px", fontSize: 14, fontWeight: 700,
                fontFamily: "var(--font-body)", cursor: sourceHtml.trim() ? "pointer" : "default",
              }}>Analyze Page</button>
              {r && (
                <>
                  <button onClick={copyReport} style={{
                    background: "var(--surface2)", color: copyMsg ? "var(--green)" : "var(--muted)",
                    border: "1px solid var(--border)", borderRadius: 10, padding: "10px 22px",
                    fontSize: 13, fontWeight: 600, fontFamily: "var(--font-body)", cursor: "pointer",
                  }}>{copyMsg || "Copy Report"}</button>
                  <button onClick={clear} style={{
                    background: "transparent", color: "var(--muted)", border: "1px solid var(--border)",
                    borderRadius: 10, padding: "10px 22px", fontSize: 13, fontWeight: 600,
                    fontFamily: "var(--font-body)", cursor: "pointer",
                  }}>Clear</button>
                </>
              )}
            </div>

            {/* RESULTS */}
            {r && (
              <div className="fade-in">
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 12, marginBottom: 24 }}>
                  {[
                    { n: highCount, label: "High Issues", color: highCount > 0 ? "var(--red)" : "var(--green)" },
                    { n: medCount, label: "Medium Issues", color: medCount > 0 ? "var(--orange)" : "var(--green)" },
                    { n: r.sourceData.links.length, label: "Crawlable Links", color: "var(--accent)" },
                    { n: r.sourceData.schema.length, label: "Schema Blocks", color: "var(--purple)" },
                    { n: r.sourceData.headings.length, label: "Headings", color: "var(--green)" },
                    { n: r.sourceData.images.length, label: "Images", color: "var(--cyan)" },
                    { n: r.sourceData.text.length, label: "Text Blocks", color: "var(--text)" },
                    ...(hasDiff ? [{ n: diffTotal, label: "JS-Only Content", color: diffTotal > 0 ? "var(--red)" : "var(--green)" }] : []),
                  ].map((card, i) => (
                    <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px", borderLeft: `3px solid ${card.color}` }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: card.color, fontFamily: "var(--font-mono)" }}>{card.n}</div>
                      <div style={{ fontSize: 10, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 3, fontWeight: 600 }}>{card.label}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: "flex", gap: 0, borderBottom: "1px solid var(--border)", marginBottom: 24 }}>
                  {[
                    { id: "audit", label: `Issues & Flags${totalIssues > 0 ? ` (${totalIssues})` : ""}` },
                    { id: "content", label: "What LLMs Can See" },
                    ...(hasDiff ? [{ id: "diff", label: `JS-Only Content${diffTotal > 0 ? ` (${diffTotal})` : ""}` }] : []),
                  ].map(t => (
                    <button key={t.id} onClick={() => setTab(t.id)} style={{
                      padding: "12px 22px", fontSize: 13, fontWeight: 600, fontFamily: "var(--font-body)",
                      color: tab === t.id ? "var(--text)" : "var(--dim)", background: "none", border: "none",
                      borderBottom: tab === t.id ? "2px solid var(--accent)" : "2px solid transparent", cursor: "pointer",
                    }}>{t.label}</button>
                  ))}
                </div>

                {tab === "audit" && (
                  r.issues.length === 0 ? (
                    <Empty><span style={{ fontSize: 28, color: "var(--green)" }}>{"\u2713"}</span><p style={{ marginTop: 10 }}>No issues detected.</p></Empty>
                  ) : (
                    <Section title="Issues Found" count={r.issues.length} defaultOpen tagText={highCount > 0 ? `${highCount} high` : "clean"} tagColor={highCount > 0 ? "var(--red)" : "var(--green)"}>
                      {r.issues.map((issue, i) => (
                        <div key={i} style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: 14, padding: "14px 18px", borderBottom: "1px solid var(--border)", background: issue.severity === "high" ? "var(--red-bg)" : issue.severity === "medium" ? "var(--orange-bg)" : "transparent" }}>
                          <Badge color={sevColor(issue.severity)}>{issue.severity}</Badge>
                          <div>
                            <div style={{ fontWeight: 600, marginBottom: 4, display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
                              {issue.title}
                              {issue.count > 1 && <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 8px", borderRadius: 10, background: "var(--dim)30", color: "var(--muted)", fontFamily: "var(--font-mono)" }}>{"\u00D7"}{issue.count}</span>}
                            </div>
                            <div style={{ fontSize: 12, color: "var(--muted)", wordBreak: "break-all", whiteSpace: "pre-wrap", fontFamily: "var(--font-mono)", lineHeight: 1.6 }}>{issue.detail}</div>
                            <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 8, padding: "9px 12px", background: "var(--surface2)", borderRadius: 6, borderLeft: "3px solid var(--orange)", lineHeight: 1.7 }}>
                              <strong style={{ color: "var(--orange)" }}>Why it matters:</strong> {issue.why}
                            </div>
                          </div>
                        </div>
                      ))}
                    </Section>
                  )
                )}

                {tab === "content" && (
                  <>
                    <Section title="Meta & OG Tags" count={r.sourceData.meta.length} defaultOpen>
                      {r.sourceData.meta.map((m, i) => <Row key={i} cols="170px 1fr"><span style={{ color: "var(--accent)", fontWeight: 600, fontFamily: "var(--font-mono)", fontSize: 12 }}>{m.name}</span><span style={{ color: "var(--muted)", wordBreak: "break-all", fontSize: 12 }}>{trunc(m.content, 200)}</span></Row>)}
                      {r.sourceData.meta.length === 0 && <Empty>No meta tags found</Empty>}
                    </Section>
                    <Section title="Structured Data (JSON-LD)" count={r.sourceData.schema.length} defaultOpen tagColor="var(--purple)">
                      {r.sourceData.schema.map((s, i) => <div key={i} style={{ padding: "14px 18px", borderBottom: "1px solid var(--border)" }}>{s.error ? <span style={{ color: "var(--red)" }}>Parse error {"\u2014"} {s.raw}</span> : <><div style={{ fontWeight: 600, marginBottom: 8, color: "var(--purple)" }}>@type: {s.parsed?.["@type"] || "unknown"}</div><pre style={{ fontSize: 11, color: "var(--muted)", whiteSpace: "pre-wrap", wordBreak: "break-all", margin: 0, maxHeight: 200, overflow: "auto", fontFamily: "var(--font-mono)" }}>{JSON.stringify(s.parsed, null, 2)}</pre></>}</div>)}
                      {r.sourceData.schema.length === 0 && <Empty>No JSON-LD structured data found</Empty>}
                    </Section>
                    <Section title="Heading Hierarchy" count={r.sourceData.headings.length} defaultOpen={false}>
                      {r.sourceData.headings.map((h, i) => { const indent = (parseInt(h.level.replace("H","")) - 1) * 22; return <Row key={i} cols="55px 1fr"><span style={{ paddingLeft: indent }}><Badge color={h.level === "H1" ? "var(--accent)" : "var(--dim)"}>{h.level}</Badge></span><span style={{ paddingLeft: indent, fontSize: 13 }}>{trunc(h.text, 120)}</span></Row>; })}
                      {r.sourceData.headings.length === 0 && <Empty>No headings found</Empty>}
                    </Section>
                    <Section title="Crawlable Links" count={r.sourceData.links.length} defaultOpen={false}>
                      {r.sourceData.links.slice(0, 200).map((l, i) => <Row key={i} cols="1fr 1fr"><span style={{ color: "var(--muted)", wordBreak: "break-all", fontSize: 12, fontFamily: "var(--font-mono)" }}>{trunc(l.href, 80)}</span><span style={{ fontSize: 12 }}>{trunc(l.text, 80)}</span></Row>)}
                      {r.sourceData.links.length > 200 && <Empty>Showing first 200 of {r.sourceData.links.length}</Empty>}
                      {r.sourceData.links.length === 0 && <Empty>No crawlable links found</Empty>}
                    </Section>
                    <Section title="Images" count={r.sourceData.images.length} defaultOpen={false}>
                      {r.sourceData.images.slice(0, 100).map((img, i) => <Row key={i} cols="1fr 1fr auto"><span style={{ color: "var(--muted)", wordBreak: "break-all", fontSize: 12, fontFamily: "var(--font-mono)" }}>{trunc(img.src, 80)}</span><span style={{ fontSize: 12 }}>{img.alt || <span style={{ color: "var(--red)", fontStyle: "italic" }}>missing alt text</span>}</span><Badge color={img.hasAlt ? "var(--green)" : "var(--red)"}>{img.hasAlt ? "alt \u2713" : "no alt"}</Badge></Row>)}
                      {r.sourceData.images.length === 0 && <Empty>No images found</Empty>}
                    </Section>
                    <Section title="Text Content Blocks" count={r.sourceData.text.length} defaultOpen={false}>
                      {r.sourceData.text.slice(0, 100).map((t, i) => <Row key={i} cols="55px 1fr"><span style={{ fontSize: 10, color: "var(--dim)", fontFamily: "var(--font-mono)" }}>&lt;{t.tag}&gt;</span><span style={{ fontSize: 12, color: "var(--muted)" }}>{trunc(t.text, 150)}</span></Row>)}
                      {r.sourceData.text.length > 100 && <Empty>Showing first 100 of {r.sourceData.text.length}</Empty>}
                      {r.sourceData.text.length === 0 && <Empty>No text content found</Empty>}
                    </Section>
                    <Section title="Data Attributes (JSON)" count={r.sourceData.dataAttrs.length} defaultOpen={false} tagColor="var(--purple)">
                      {r.sourceData.dataAttrs.slice(0, 50).map((d, i) => <div key={i} style={{ padding: "10px 18px", borderBottom: "1px solid var(--border)" }}><span style={{ color: "var(--accent)", fontSize: 12, fontFamily: "var(--font-mono)" }}>&lt;{d.element} <span style={{ color: "var(--purple)" }}>{d.attr}</span>&gt;</span><pre style={{ fontSize: 11, color: "var(--dim)", whiteSpace: "pre-wrap", wordBreak: "break-all", margin: "4px 0 0", maxHeight: 100, overflow: "auto", fontFamily: "var(--font-mono)" }}>{JSON.stringify(d.data, null, 2).slice(0, 400)}</pre></div>)}
                      {r.sourceData.dataAttrs.length === 0 && <Empty>No JSON data attributes found</Empty>}
                    </Section>
                  </>
                )}

                {tab === "diff" && hasDiff && (
                  diffTotal === 0 ? (
                    <Empty><span style={{ fontSize: 28, color: "var(--green)" }}>{"\u2713"}</span><p style={{ marginTop: 10 }}>No meaningful differences found.</p></Empty>
                  ) : (
                    <>
                      <div style={{ padding: "0 0 18px", fontSize: 13, color: "var(--muted)", lineHeight: 1.7 }}>
                        The following content <strong style={{ color: "var(--red)" }}>only exists after JavaScript runs</strong> {"\u2014"} LLMs will not see it.
                      </div>
                      {r.diff.links.length > 0 && <Section title="Links only in rendered DOM" count={r.diff.links.length} defaultOpen tagText="JS-only" tagColor="var(--red)">{r.diff.links.slice(0,100).map((l,i) => <Row key={i} cols="1fr 1fr" highlight="var(--red-bg)"><span style={{ color: "var(--red)", wordBreak: "break-all", fontSize: 12, fontFamily: "var(--font-mono)" }}>{trunc(l.href,80)}</span><span style={{ fontSize: 12, color: "var(--muted)" }}>{trunc(l.text,80)}</span></Row>)}</Section>}
                      {r.diff.text.length > 0 && <Section title="Text only in rendered DOM" count={r.diff.text.length} defaultOpen tagText="JS-only" tagColor="var(--red)">{r.diff.text.slice(0,80).map((t,i) => <Row key={i} cols="55px 1fr" highlight="var(--red-bg)"><span style={{ fontSize: 10, color: "var(--dim)", fontFamily: "var(--font-mono)" }}>&lt;{t.tag}&gt;</span><span style={{ fontSize: 12, color: "var(--red)" }}>{trunc(t.text,150)}</span></Row>)}</Section>}
                      {r.diff.headings.length > 0 && <Section title="Headings only in rendered DOM" count={r.diff.headings.length} defaultOpen tagText="JS-only" tagColor="var(--red)">{r.diff.headings.map((h,i) => <Row key={i} cols="55px 1fr" highlight="var(--red-bg)"><Badge color="var(--red)">{h.level}</Badge><span style={{ color: "var(--red)" }}>{h.text}</span></Row>)}</Section>}
                      {r.diff.schema.length > 0 && <Section title="Structured data only in rendered DOM" count={r.diff.schema.length} defaultOpen tagText="JS-only" tagColor="var(--red)">{r.diff.schema.map((s,i) => <div key={i} style={{ padding: "14px 18px", borderBottom: "1px solid var(--border)", background: "var(--red-bg)" }}><div style={{ color: "var(--red)", fontWeight: 600 }}>@type: {s.parsed?.["@type"] || "unknown"}</div></div>)}</Section>}
                      {r.diff.images.length > 0 && <Section title="Images only in rendered DOM" count={r.diff.images.length} defaultOpen={false} tagText="JS-only" tagColor="var(--orange)">{r.diff.images.slice(0,50).map((img,i) => <Row key={i} cols="1fr 1fr"><span style={{ color: "var(--muted)", wordBreak: "break-all", fontSize: 12, fontFamily: "var(--font-mono)" }}>{trunc(img.src,80)}</span><span style={{ fontSize: 12 }}>{img.alt || <span style={{ color: "var(--red)", fontStyle: "italic" }}>no alt</span>}</span></Row>)}</Section>}
                    </>
                  )
                )}
              </div>
            )}
          </>
        )}

        {/* ═══ MODE: AGENT READINESS ═══ */}
        {mode === "agent" && (
          <AgentReadiness sourceDoc={sourceDoc} sourceHtml={sourceHtml} />
        )}

        {/* ═══ MODE: CRAWL TEST ═══ */}
        {mode === "crawl" && (
          <CrawlTest onResults={setCrawlResults} />
        )}

        <div style={{ height: 60 }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
